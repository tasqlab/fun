<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PASSWORD GAME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0d0f;
  --bg2:      #13131a;
  --bg3:      #1a1a26;
  --panel:    #0f0f18;
  --border:   #2a2a3d;
  --ink:      #c8c8e8;
  --muted:    #5a5a7a;
  --green:    #39ff6e;
  --red:      #ff3a3a;
  --yellow:   #ffd23f;
  --cyan:     #3af0ff;
  --pink:     #ff3adf;
  --orange:   #ff7c3a;
  --glow-g:   0 0 8px #39ff6e88;
  --glow-r:   0 0 8px #ff3a3a88;
  --glow-y:   0 0 8px #ffd23f88;
  --glow-c:   0 0 8px #3af0ff88;
  --glow-p:   0 0 8px #ff3adf88;
}

*{box-sizing:border-box;margin:0;padding:0}

html{
  background:var(--bg);
  color:var(--ink);
  font-family:'VT323',monospace;
  font-size:18px;
  line-height:1.4;
  min-height:100vh;
}

/* scanline overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* crt flicker */
@keyframes flicker{
  0%,100%{opacity:1}
  92%{opacity:1}
  93%{opacity:0.94}
  94%{opacity:1}
  96%{opacity:0.97}
}
body{animation:flicker 6s infinite}

/* pixel border mixin via box-shadow */
.pixel-box{
  border:2px solid var(--border);
  box-shadow:
    inset 0 0 0 1px #ffffff08,
    0 0 0 1px #00000080;
  image-rendering:pixelated;
}

/* ── HEADER ── */
header{
  text-align:center;
  padding:36px 20px 20px;
  position:relative;
}
header::after{
  content:'';
  display:block;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),transparent);
  margin-top:24px;
  box-shadow:var(--glow-c);
}

.title-main{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(14px,3.5vw,28px);
  color:var(--cyan);
  text-shadow:0 0 20px #3af0ffaa, 3px 3px 0 #001f3f;
  letter-spacing:0.05em;
  line-height:1.6;
}
.title-sub{
  font-size:20px;
  color:var(--muted);
  margin-top:8px;
  letter-spacing:0.2em;
}

/* ── LAYOUT ── */
.container{
  max-width:760px;
  margin:0 auto;
  padding:24px 20px 80px;
}

/* ── PASSWORD INPUT AREA ── */
.input-section{
  background:var(--panel);
  border:2px solid var(--border);
  padding:20px;
  margin-bottom:24px;
  position:relative;
}
.input-section::before{
  content:'> ENTER PASSWORD:';
  display:block;
  font-family:'Press Start 2P',monospace;
  font-size:8px;
  color:var(--muted);
  letter-spacing:0.1em;
  margin-bottom:12px;
}

#password-input{
  width:100%;
  background:#080810;
  border:2px solid var(--border);
  color:var(--green);
  font-family:'VT323',monospace;
  font-size:28px;
  padding:12px 16px;
  outline:none;
  caret-color:var(--green);
  text-shadow:var(--glow-g);
  letter-spacing:0.08em;
  transition:border-color 0.2s, box-shadow 0.2s;
  word-break:break-all;
}
#password-input:focus{
  border-color:var(--green);
  box-shadow:var(--glow-g), inset 0 0 20px #39ff6e0a;
}

/* strength bar */
.strength-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:12px;
}
.strength-label{
  font-size:14px;
  color:var(--muted);
  white-space:nowrap;
  font-family:'Press Start 2P',monospace;
  font-size:7px;
}
.strength-track{
  flex:1;
  height:8px;
  background:#080810;
  border:1px solid var(--border);
  overflow:hidden;
}
#strength-bar{
  height:100%;
  width:0%;
  transition:width 0.3s, background 0.3s;
  background:var(--red);
}
.char-count{
  font-size:16px;
  color:var(--muted);
  min-width:60px;
  text-align:right;
}

/* ── RULES LIST ── */
.rules-header{
  font-family:'Press Start 2P',monospace;
  font-size:9px;
  color:var(--yellow);
  letter-spacing:0.15em;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:12px;
}
.rules-header::after{
  content:'';flex:1;
  height:1px;background:var(--border);
}
.rule-count-badge{
  background:var(--yellow);
  color:#000;
  font-size:8px;
  padding:2px 6px;
  font-family:'Press Start 2P',monospace;
}

#rules-container{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ── INDIVIDUAL RULE ── */
.rule{
  background:var(--bg2);
  border:2px solid var(--border);
  padding:14px 16px;
  display:flex;
  gap:14px;
  align-items:flex-start;
  position:relative;
  overflow:hidden;
  transition:border-color 0.15s, background 0.15s;
  animation:ruleSlideIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;
  transform:translateX(-12px);
}

@keyframes ruleSlideIn{
  to{opacity:1;transform:translateX(0)}
}

.rule.satisfied{
  border-color:#39ff6e44;
  background:#091209;
}
.rule.satisfied::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,#39ff6e08,transparent);
}

.rule.violated{
  border-color:#ff3a3a66;
  background:#120909;
  animation:shake 0.25s ease, ruleSlideIn 0s;
  opacity:1;transform:none;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

.rule-number{
  font-family:'Press Start 2P',monospace;
  font-size:8px;
  color:var(--muted);
  min-width:28px;
  padding-top:3px;
  flex-shrink:0;
}
.rule-number.ok{color:var(--green)}
.rule-number.bad{color:var(--red)}

.rule-body{flex:1}

.rule-text{
  font-size:20px;
  color:var(--ink);
  line-height:1.5;
}
.rule-text em{
  font-style:normal;
  color:var(--yellow);
}
.rule-text code{
  background:#ffffff0d;
  border:1px solid #ffffff18;
  padding:0 4px;
  color:var(--cyan);
  font-family:'VT323',monospace;
}

.rule-status{
  font-size:14px;
  margin-top:4px;
}
.rule-status.ok{color:var(--green);text-shadow:var(--glow-g)}
.rule-status.bad{color:var(--red);text-shadow:var(--glow-r)}

/* status icon pixel art */
.rule-icon{
  width:20px;height:20px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  filter:drop-shadow(0 0 4px currentColor);
}
.rule-icon.ok{color:var(--green)}
.rule-icon.bad{color:var(--red)}
.rule-icon.pending{color:var(--muted)}

/* ── SPECIAL RULE WIDGETS ── */
.captcha-box{
  display:inline-block;
  background:#1a0a00;
  border:2px solid var(--orange);
  padding:10px 16px;
  margin-top:8px;
  font-family:'Press Start 2P',monospace;
  font-size:12px;
  letter-spacing:0.2em;
  color:var(--orange);
  text-shadow:var(--glow-y);
  position:relative;
  cursor:pointer;
  user-select:none;
}
.captcha-box::before{content:'[CAPTCHA] ';font-size:8px;color:var(--muted);display:block;margin-bottom:6px}
.captcha-box:hover{background:#220d00}
.captcha-refresh{font-size:12px;color:var(--muted);margin-left:8px}

.wordle-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  max-width:200px;
  margin-top:8px;
}
.wordle-cell{
  aspect-ratio:1;
  background:#080810;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  text-transform:uppercase;
}
.wordle-cell.correct{background:#1a3a1a;border-color:var(--green);color:var(--green)}
.wordle-cell.present{background:#2a2a00;border-color:var(--yellow);color:var(--yellow)}
.wordle-cell.absent {background:#1a0000;border-color:#440000;color:#440000}

.chess-board{
  display:inline-grid;
  grid-template-columns:repeat(8,20px);
  gap:0;
  border:2px solid var(--muted);
  margin-top:8px;
  font-size:14px;
  line-height:1;
}
.chess-cell{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.chess-cell.light{background:#2a2a1a}
.chess-cell.dark {background:#1a1a10}
.chess-cell.highlight{background:#3a2a00}

.egg-timer{
  display:inline-flex;
  align-items:center;gap:8px;
  margin-top:6px;
  padding:6px 12px;
  background:#0a0a1a;
  border:1px solid var(--border);
}
.egg-timer-count{
  font-family:'Press Start 2P',monospace;
  font-size:18px;
  color:var(--orange);
  min-width:40px;
  text-shadow:var(--glow-y);
}

/* ── WIN SCREEN ── */
#win-screen{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.95);
  z-index:1000;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
}
#win-screen.show{display:flex}
.win-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(18px,4vw,36px);
  color:var(--green);
  text-shadow:0 0 30px var(--green), 0 0 60px #39ff6e44;
  margin-bottom:16px;
  animation:winPulse 1s ease-in-out infinite alternate;
}
@keyframes winPulse{
  from{text-shadow:0 0 20px var(--green)}
  to{text-shadow:0 0 40px var(--green), 0 0 80px #39ff6e66}
}
.win-password{
  background:#080810;
  border:2px solid var(--green);
  padding:16px 24px;
  font-size:22px;
  color:var(--green);
  max-width:600px;
  word-break:break-all;
  margin:20px 0;
  text-shadow:var(--glow-g);
}
.pixel-btn{
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  padding:14px 24px;
  background:transparent;
  border:2px solid var(--cyan);
  color:var(--cyan);
  cursor:pointer;
  letter-spacing:0.15em;
  text-transform:uppercase;
  transition:all 0.15s;
  margin-top:16px;
}
.pixel-btn:hover{
  background:var(--cyan);
  color:#000;
  box-shadow:var(--glow-c);
}

/* ── PROGRESS ── */
#progress-bar-wrap{
  position:fixed;top:0;left:0;right:0;
  height:3px;z-index:200;
}
#progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  transition:width 0.3s;
  box-shadow:0 0 6px var(--cyan);
}

/* ── BLINKING CURSOR ── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite}

/* ── CONFETTI CANVAS ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}
</style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<canvas id="confetti"></canvas>

<header>
  <div class="title-main">THE PASSWORD GAME</div>
  <div class="title-sub">// HOW HARD CAN IT BE? //</div>
</header>

<div class="container">
  <div class="input-section">
    <input
      type="text"
      id="password-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="start typing..."
    >
    <div class="strength-row">
      <span class="strength-label">STRENGTH</span>
      <div class="strength-track"><div id="strength-bar"></div></div>
      <span class="char-count" id="char-count">0 chars</span>
    </div>
  </div>

  <div class="rules-header">
    RULES
    <span class="rule-count-badge" id="rule-count-badge">0/0</span>
  </div>

  <div id="rules-container"></div>
</div>

<div id="win-screen">
  <div class="win-title">▓ ACCESS GRANTED ▓</div>
  <div style="font-size:22px;color:var(--muted);margin-bottom:8px">YOUR FINAL PASSWORD:</div>
  <div class="win-password" id="win-password-display"></div>
  <div style="font-size:18px;color:var(--muted)" id="win-stats"></div>
  <button class="pixel-btn" onclick="restartGame()">▶ PLAY AGAIN</button>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const pw = () => $('password-input').value;

function countVowels(s){ return (s.match(/[aeiouAEIOU]/g)||[]).length }
function countDigits(s){ return (s.match(/\d/g)||[]).length }
function digitSum(s){ return [...(s.match(/\d/g)||[])].reduce((a,b)=>a+Number(b),0) }
function hasUpper(s){ return /[A-Z]/.test(s) }
function hasLower(s){ return /[a-z]/.test(s) }
function hasSpecial(s){ return /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(s) }
function hasEmoji(s){ return /\p{Emoji}/u.test(s) }
function countRoman(s){
  const romans=['I','V','X','L','C','D','M'];
  return romans.reduce((acc,r)=>acc+(s.split(r).length-1),0);
}
function romanValue(s){
  const map={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let sum=0;
  [...s.toUpperCase()].forEach(c=>{ if(map[c]) sum+=map[c]; });
  return sum;
}
function isPrime(n){
  if(n<2)return false;
  for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0)return false;
  return true;
}
function hasPeriodic(s){
  const elements=['H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Fe','Cu','Zn','Ag','Au','Hg','Pb'];
  return elements.some(e=>s.includes(e));
}
function getMonth(){
  return ['January','February','March','April','May','June','July','August','September','October','November','December'][new Date().getMonth()];
}
function getDay(){return new Date().getDate()}
function getYear(){return new Date().getFullYear()}

// Moon phase (approximate)
function getMoonPhase(){
  const phases=['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const d=new Date();
  const diff=Math.floor((d-new Date(2000,0,6))/86400000);
  return phases[Math.round((diff%29.5)/29.5*8)%8];
}

function countWords(s){return (s.trim().match(/\b\w+\b/g)||[]).length}
function hasColor(s){
  const colors=['red','orange','yellow','green','blue','indigo','violet','purple','pink','black','white','grey','gray','cyan','magenta'];
  const sl=s.toLowerCase();
  return colors.some(c=>sl.includes(c));
}

// ── CAPTCHA ───────────────────────────────────────────────────────────────
const captchaChars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
let currentCaptcha='';
function genCaptcha(){
  currentCaptcha='';
  for(let i=0;i<6;i++) currentCaptcha+=captchaChars[Math.floor(Math.random()*captchaChars.length)];
  return currentCaptcha;
}
genCaptcha();

// ── WORDLE ────────────────────────────────────────────────────────────────
const wordleWords=['BRICK','FLAME','GLOOM','PIXEL','CRYPT','STORM','FROST','PLANK','DWARF','QUEST'];
let wordleAnswer=wordleWords[Math.floor(Math.random()*wordleWords.length)];

function getWordleHint(pw){
  const s=pw.toUpperCase();
  return wordleAnswer.split('').map((letter,i)=>{
    if(s[i]===letter) return {l:letter,state:'correct'};
    if(s.includes(letter)) return {l:letter,state:'present'};
    return {l:letter,state:'absent'};
  });
}

function wordleSatisfied(pw){
  return getWordleHint(pw).every(c=>c.state==='correct');
}

// ── CHESS MOVE ────────────────────────────────────────────────────────────
// Rule: password must contain "Nf3" or "e4" or "d4" (classic opening moves)
const chessMoves=['Nf3','e4','d4','c4','g3','b3'];
let requiredChessMove=chessMoves[Math.floor(Math.random()*chessMoves.length)];

// ── EGG TIMER ─────────────────────────────────────────────────────────────
let eggSeconds=0;
let eggTimerInterval=null;
let eggTimerStarted=false;

// ── SACRIFICE ─────────────────────────────────────────────────────────────
let sacrificedLetter='';
const sacrificeLetters='BCDFGHJKLMNPQRSTVWXYZ'.split('');
if(!sacrificedLetter) sacrificedLetter=sacrificeLetters[Math.floor(Math.random()*sacrificeLetters.length)];

// ── SPONSOR ───────────────────────────────────────────────────────────────
const sponsors=['Pepsi','Google','NASA','IKEA','Adidas','Sony','Apple','Adobe'];
let requiredSponsor=sponsors[Math.floor(Math.random()*sponsors.length)];

// ── RULES DEFINITION ──────────────────────────────────────────────────────
// Each rule: { id, text(), check(), widget?(), hint?() }
const ALL_RULES = [
  {
    id:'length5',
    text:()=>'Your password must be <em>at least 5 characters</em>.',
    check:()=>pw().length>=5,
    hint:()=>`${pw().length}/5 characters`
  },
  {
    id:'uppercase',
    text:()=>'Your password must contain an <em>uppercase letter</em>.',
    check:()=>hasUpper(pw()),
  },
  {
    id:'number',
    text:()=>'Your password must contain a <em>number</em>.',
    check:()=>countDigits(pw())>0,
  },
  {
    id:'special',
    text:()=>'Your password must contain a <em>special character</em>.',
    check:()=>hasSpecial(pw()),
  },
  {
    id:'digitsum25',
    text:()=>'The <em>digits in your password must add up to 25</em>.',
    check:()=>digitSum(pw())===25,
    hint:()=>`Current digit sum: ${digitSum(pw())}`
  },
  {
    id:'month',
    text:()=>`Your password must include the <em>current month</em> (<code>${getMonth()}</code>).`,
    check:()=>pw().includes(getMonth()),
  },
  {
    id:'roman',
    text:()=>'Your password must contain a <em>Roman numeral</em>.',
    check:()=>countRoman(pw())>0,
  },
  {
    id:'roman35',
    text:()=>'The <em>Roman numerals in your password</em> must add up to <em>exactly 35</em>.',
    check:()=>romanValue(pw())===35,
    hint:()=>`Current Roman numeral value: ${romanValue(pw())} (need 35)`
  },
  {
    id:'vowels',
    text:()=>'Your password must contain <em>at least 3 vowels</em>.',
    check:()=>countVowels(pw())>=3,
    hint:()=>`${countVowels(pw())}/3 vowels`
  },
  {
    id:'prime',
    text:()=>'The <em>length of your password</em> must be a <em>prime number</em>.',
    check:()=>isPrime(pw().length),
    hint:()=>`Length ${pw().length} — ${isPrime(pw().length)?'✓ prime':'✗ not prime'}`
  },
  {
    id:'periodic',
    text:()=>'Your password must include a <em>chemical element symbol</em> (e.g. <code>Fe</code>, <code>Au</code>, <code>Na</code>).',
    check:()=>hasPeriodic(pw()),
  },
  {
    id:'wordle',
    text:()=>`Your password must contain the <em>Wordle answer</em>.`,
    check:()=>wordleSatisfied(pw()),
    widget:()=>{
      const hints=getWordleHint(pw());
      const cells=hints.map(h=>`<div class="wordle-cell ${h.state}">${h.l}</div>`).join('');
      return `<div style="font-size:14px;color:var(--muted);margin-top:6px">Guess the 5-letter word:</div>
              <div class="wordle-grid">${cells}</div>`;
    },
    hint:()=>wordleSatisfied(pw())?'Correct!':'Not found in password'
  },
  {
    id:'captcha',
    text:()=>'Your password must include <em>this CAPTCHA</em>:',
    check:()=>pw().includes(currentCaptcha),
    widget:()=>`<div class="captcha-box" onclick="refreshCaptcha()" title="Click to refresh">
      ${currentCaptcha.split('').join(' ')}
      <span class="captcha-refresh">↺</span>
    </div><div style="font-size:14px;color:var(--muted);margin-top:4px">Click to refresh captcha</div>`,
    hint:()=>pw().includes(currentCaptcha)?'Found ✓':`Must include: ${currentCaptcha}`
  },
  {
    id:'emoji',
    text:()=>'Your password must contain an <em>emoji</em>. 🎉',
    check:()=>hasEmoji(pw()),
  },
  {
    id:'moon',
    text:()=>`Your password must include <em>today's moon phase</em> emoji: <code>${getMoonPhase()}</code>`,
    check:()=>pw().includes(getMoonPhase()),
  },
  {
    id:'chess',
    text:()=>`Your password must contain the <em>chess move</em> <code>${requiredChessMove}</code>.`,
    check:()=>pw().includes(requiredChessMove),
  },
  {
    id:'color',
    text:()=>'Your password must contain a <em>color</em> name.',
    check:()=>hasColor(pw()),
  },
  {
    id:'day',
    text:()=>`Your password must include <em>today's day of the month</em> (<code>${getDay()}</code>).`,
    check:()=>pw().includes(String(getDay())),
  },
  {
    id:'year',
    text:()=>`Your password must include the <em>current year</em> (<code>${getYear()}</code>).`,
    check:()=>pw().includes(String(getYear())),
  },
  {
    id:'sponsor',
    text:()=>`Your password is <em>sponsored by ${requiredSponsor}</em>. It must include <code>${requiredSponsor}</code>.`,
    check:()=>pw().includes(requiredSponsor),
  },
  {
    id:'length20',
    text:()=>'Your password must be <em>at least 20 characters</em>.',
    check:()=>pw().length>=20,
    hint:()=>`${pw().length}/20 characters`
  },
  {
    id:'nosequential',
    text:()=>'Your password must <em>not contain 3 sequential letters</em> (e.g. <code>abc</code>, <code>xyz</code>).',
    check:()=>{
      const s=pw().toLowerCase();
      for(let i=0;i<s.length-2;i++){
        const a=s.charCodeAt(i),b=s.charCodeAt(i+1),c=s.charCodeAt(i+2);
        if(b===a+1&&c===b+1) return false;
      }
      return true;
    }
  },
  {
    id:'sacrifice',
    text:()=>`The letter <em><code>${sacrificedLetter}</code></em> has been <em>sacrificed</em>. Your password <em>must not contain it</em>.`,
    check:()=>!pw().includes(sacrificedLetter)&&!pw().includes(sacrificedLetter.toLowerCase()),
    hint:()=>pw().includes(sacrificedLetter)||pw().includes(sacrificedLetter.toLowerCase())?`Found "${sacrificedLetter}" — remove it!`:'✓ Not present'
  },
  {
    id:'palindrome_word',
    text:()=>'Your password must contain a <em>palindrome of at least 3 letters</em> (e.g. <code>aba</code>, <code>racecar</code>).',
    check:()=>{
      const s=pw();
      for(let len=3;len<=s.length;len++){
        for(let i=0;i<=s.length-len;i++){
          const sub=s.slice(i,i+len).toLowerCase();
          if(sub===sub.split('').reverse().join('')) return true;
        }
      }
      return false;
    }
  },
  {
    id:'eggtimer',
    text:()=>'Your password must include <em>🥚 an egg</em>. You have <em>60 seconds</em> to finish or the egg spoils! 🍳',
    check:()=>pw().includes('🥚'),
    widget:()=>{
      if(!eggTimerStarted&&pw().includes('🥚')){
        startEggTimer();
      }
      const timeLeft=Math.max(0,60-eggSeconds);
      const color=timeLeft<15?'var(--red)':timeLeft<30?'var(--yellow)':'var(--orange)';
      return `<div class="egg-timer">
        <span style="font-size:20px">🥚</span>
        <span style="font-size:14px;color:var(--muted)">TIME LEFT:</span>
        <span class="egg-timer-count" style="color:${color}">${String(timeLeft).padStart(2,'0')}s</span>
        ${timeLeft<15?'<span style="color:var(--red);font-size:16px;animation:blink 0.5s infinite">⚠ HURRY!</span>':''}
      </div>`;
    },
    hint:()=>pw().includes('🥚')?'Egg found — but the timer is ticking!':'Must include 🥚'
  },
  {
    id:'length_prime_big',
    text:()=>'Your password must be <em>at least 31 characters</em>.',
    check:()=>pw().length>=31,
    hint:()=>`${pw().length}/31 characters`
  },
];

// ── GAME STATE ───────────────────────────────────────────────────────────
let visibleRules = [];
let ruleIndex = 0;
let gameWon = false;
let startTime = Date.now();

function startEggTimer(){
  if(eggTimerStarted) return;
  eggTimerStarted=true;
  eggTimerInterval=setInterval(()=>{
    eggSeconds++;
    renderRules();
    if(eggSeconds>=60){
      clearInterval(eggTimerInterval);
      // egg spoiled — scramble the password
      $('password-input').value=pw().replace('🥚','🍳');
      eggSeconds=0;
      eggTimerStarted=false;
      shakeInput();
    }
  },1000);
}

function refreshCaptcha(){
  genCaptcha();
  renderRules();
}

function shakeInput(){
  const el=$('password-input');
  el.style.transform='translateX(-4px)';
  el.style.borderColor='var(--red)';
  setTimeout(()=>{el.style.transform='translateX(4px)'},60);
  setTimeout(()=>{el.style.transform='translateX(-2px)'},120);
  setTimeout(()=>{el.style.transform='';el.style.borderColor=''},200);
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderRules(){
  const container=$('rules-container');
  const pass=pw();
  let satisfied=0;

  container.innerHTML=visibleRules.map((rule,i)=>{
    const ok=rule.check();
    if(ok) satisfied++;
    const icon=ok?'✔':'✖';
    const iconClass=ok?'ok':'bad';
    const ruleClass=ok?'satisfied':'violated';
    const delayStyle=`animation-delay:${i*0.04}s`;

    const widgetHtml=rule.widget?rule.widget():'';
    const hintHtml=rule.hint?`<div class="rule-status ${ok?'ok':'bad'}">${rule.hint()}</div>`:'';

    return `<div class="rule ${ruleClass}" style="${delayStyle}" data-id="${rule.id}">
      <div class="rule-number ${ok?'ok':'bad'}">#${i+1}</div>
      <div class="rule-body">
        <div class="rule-text">${rule.text()}</div>
        ${widgetHtml}
        ${hintHtml}
      </div>
      <div class="rule-icon ${ok?'ok':'bad'}">${icon}</div>
    </div>`;
  }).join('');

  // Progress
  $('rule-count-badge').textContent=`${satisfied}/${visibleRules.length}`;
  const pct=visibleRules.length?satisfied/visibleRules.length*100:0;
  $('progress-bar').style.width=pct+'%';

  // Strength bar
  const strPct=Math.min(100,(pass.length/50)*100);
  const strBar=$('strength-bar');
  strBar.style.width=strPct+'%';
  strBar.style.background=strPct<30?'var(--red)':strPct<60?'var(--yellow)':'var(--green)';

  // Char count
  $('char-count').textContent=`${pass.length} chars`;

  // Check win
  if(visibleRules.length===ALL_RULES.length && satisfied===ALL_RULES.length && !gameWon){
    triggerWin();
  }
}

function maybeRevealNextRule(){
  if(ruleIndex>=ALL_RULES.length) return;
  // Reveal next rule when all current rules are satisfied
  const allSat=visibleRules.every(r=>r.check());
  if(allSat || visibleRules.length===0){
    if(ruleIndex<ALL_RULES.length){
      visibleRules.push(ALL_RULES[ruleIndex]);
      ruleIndex++;
    }
  }
}

// ── INPUT HANDLER ─────────────────────────────────────────────────────────
$('password-input').addEventListener('input',()=>{
  if(gameWon) return;
  maybeRevealNextRule();
  renderRules();
  // Poll to reveal more rules while satisfied
  setTimeout(maybeRevealNextRule,10);
  setTimeout(renderRules,11);
});

// ── WIN ───────────────────────────────────────────────────────────────────
function triggerWin(){
  gameWon=true;
  clearInterval(eggTimerInterval);
  const elapsed=Math.round((Date.now()-startTime)/1000);
  const mins=Math.floor(elapsed/60);
  const secs=elapsed%60;
  $('win-password-display').textContent=pw();
  $('win-stats').textContent=`Time: ${mins}m ${secs}s  •  Length: ${pw().length} chars  •  Rules: ${ALL_RULES.length}`;
  $('win-screen').classList.add('show');
  startConfetti();
}

function restartGame(){
  gameWon=false;
  visibleRules=[];
  ruleIndex=0;
  eggSeconds=0;
  eggTimerStarted=false;
  clearInterval(eggTimerInterval);
  currentCaptcha=genCaptcha();
  wordleAnswer=wordleWords[Math.floor(Math.random()*wordleWords.length)];
  requiredSponsor=sponsors[Math.floor(Math.random()*sponsors.length)];
  requiredChessMove=chessMoves[Math.floor(Math.random()*chessMoves.length)];
  sacrificedLetter=sacrificeLetters[Math.floor(Math.random()*sacrificeLetters.length)];
  $('password-input').value='';
  $('win-screen').classList.remove('show');
  $('rules-container').innerHTML='';
  $('rule-count-badge').textContent='0/0';
  $('progress-bar').style.width='0%';
  $('strength-bar').style.width='0%';
  $('char-count').textContent='0 chars';
  startTime=Date.now();
  stopConfetti();
  // Seed first rule
  visibleRules.push(ALL_RULES[0]);
  ruleIndex=1;
  renderRules();
}

// ── CONFETTI ──────────────────────────────────────────────────────────────
let confettiAnim=null;
const confCanvas=$('confetti');
const confCtx=confCanvas.getContext('2d');
let confPieces=[];

function startConfetti(){
  confCanvas.width=innerWidth; confCanvas.height=innerHeight;
  confPieces=Array.from({length:120},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight-innerHeight,
    w:6+Math.random()*8,h:6+Math.random()*8,
    r:Math.random()*Math.PI*2,
    dr:(Math.random()-0.5)*0.15,
    vx:(Math.random()-0.5)*2,
    vy:2+Math.random()*3,
    color:['#39ff6e','#3af0ff','#ff3adf','#ffd23f','#ff7c3a'][Math.floor(Math.random()*5)]
  }));
  function draw(){
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    confPieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.r+=p.dr;
      if(p.y>confCanvas.height) p.y=-10;
      confCtx.save();
      confCtx.translate(p.x+p.w/2,p.y+p.h/2);
      confCtx.rotate(p.r);
      confCtx.fillStyle=p.color;
      confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      confCtx.restore();
    });
    confettiAnim=requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti(){
  cancelAnimationFrame(confettiAnim);
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
}

// ── INIT ──────────────────────────────────────────────────────────────────
visibleRules.push(ALL_RULES[0]);
ruleIndex=1;
renderRules();
$('password-input').focus();
</script>
</body>
