<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Soup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #0a0a0a;
      --text: #f5f5f5;
      --accent: #ff6b35;
      --accent-dim: #ff6b3533;
    }
    
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      cursor: default;
      user-select: none;
    }
    
    #soup-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    
    canvas {
      display: block;
    }
    
    .ui-overlay {
      position: fixed;
      pointer-events: none;
      z-index: 10;
    }
    
    #title {
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 2s;
    }
    
    #score {
      top: 30px;
      right: 40px;
      font-size: 13px;
      opacity: 0.5;
    }
    
    #hint {
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0;
      transition: opacity 1s;
    }
    
    #word-display {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 8px;
      opacity: 0;
      transition: all 0.3s;
    }
    
    #word-display.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.1);
    }
    
    .word-reveal {
      position: fixed;
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
      pointer-events: none;
      animation: floatUp 1.5s ease-out forwards;
      z-index: 100;
    }
    
    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-80px) scale(0.8);
      }
    }
    
    .achievement {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: var(--accent);
      opacity: 0;
      pointer-events: none;
      animation: achievementPopup 2s ease-out forwards;
      white-space: nowrap;
    }
    
    @keyframes achievementPopup {
      0%, 10% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20%, 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    }
    
    #word-list {
      position: fixed;
      top: 30px;
      left: 40px;
      font-size: 11px;
      opacity: 0.3;
      max-width: 150px;
      line-height: 1.8;
    }
    
    .secret-trigger {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 20px;
      height: 20px;
      opacity: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="soup-container">
    <canvas id="canvas"></canvas>
  </div>
  
  <div id="title" class="ui-overlay">word soup</div>
  <div id="score" class="ui-overlay">words: <span id="word-count">0</span></div>
  <div id="word-list" class="ui-overlay"></div>
  <div id="hint" class="ui-overlay">drag letters to connect</div>
  <div id="word-display" class="ui-overlay"></div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let letters = [];
    let connectedLetters = [];
    let isDragging = false;
    let dragStart = null;
    let foundWords = new Set();
    let wordCount = 0;
    let hintShown = false;
    
    // Word bank - common 3-6 letter words
    const wordBank = [
      'THE', 'AND', 'FOR', 'ARE', 'BUT', 'NOT', 'YOU', 'ALL', 'CAN', 'HAD',
      'HER', 'WAS', 'ONE', 'OUR', 'OUT', 'DAY', 'GET', 'HAS', 'HIM', 'HIS',
      'HOW', 'MAN', 'NEW', 'NOW', 'OLD', 'SEE', 'TWO', 'WAY', 'WHO', 'BOY',
      'DID', 'ITS', 'LET', 'PUT', 'SAY', 'SHE', 'TOO', 'USE', 'DAD', 'MOM',
      'ACT', 'BAR', 'CAR', 'DEW', 'EAT', 'FAR', 'GYM', 'HEY', 'INK', 'JET',
      'KEY', 'LOG', 'MAD', 'NAP', 'ODD', 'PEN', 'RUG', 'SKY', 'TOY', 'URN',
      'VET', 'WEB', 'ZOO', 'ART', 'BED', 'CAT', 'DOG', 'EGG', 'FISH', 'ICE',
      'JAM', 'KITE', 'LAMP', 'NEST', 'OWL', 'PIE', 'RAT', 'SUN', 'TAG', 'VAN',
      'WOLF', 'YARN', 'ZOOM', 'BIRD', 'BLUE', 'DUCK', 'FROG', 'GRIN', 'HAND',
      'JUMP', 'KING', 'LION', 'MOON', 'NOISE', 'OPEN', 'PINK', 'QUIET', 'RAIN',
      'SING', 'TREE', 'UNICORN', 'VOICE', 'WATER', 'YELLOW', 'ZEBRA', 'APPLE',
      'BREAD', 'CHAIR', 'DANCE', 'EARTH', 'FLAME', 'GHOST', 'HEART', 'IMAGE',
      'JOY', 'KNIFE', 'LEMON', 'MUSIC', 'NIGHT', 'OCEAN', 'PAPER', 'QUEEN',
      'RIVER', 'SHELL', 'TIGER', 'UMBRA', 'VOICE', 'WHALE', 'XENON', 'YOUTH',
      'DREAM', 'GLOW', 'HARM', 'IDEA', 'KIND', 'LIFE', 'MIST', 'NOVA', 'ORBIT',
      'PEACE', 'QUEST', 'RISE', 'SPARK', 'WAVE', 'ALPHA', 'BRAVO', 'DELTA',
      'ECHO', 'HOT', 'COLD', 'FAST', 'SLOW', 'SOFT', 'HARD', 'DARK', 'BRIGHT',
      'LOVE', 'HOPE', 'FEAR', 'CALM', 'WILD', 'FREE', 'TRUE', 'FAKE', 'REAL'
    ];
    
    // Common words prioritized
    const commonWords = [
      'THE', 'AND', 'FOR', 'ARE', 'BUT', 'NOT', 'YOU', 'ALL', 'CAN', 'WAS',
      'HER', 'ONE', 'OUR', 'OUT', 'DAY', 'GET', 'HAS', 'HIM', 'HIS', 'HOW',
      'MAN', 'NEW', 'NOW', 'OLD', 'SEE', 'TWO', 'WAY', 'WHO', 'BOY', 'DID',
      'ITS', 'LET', 'PUT', 'SAY', 'SHE', 'TOO', 'USE', 'DAD', 'MOM', 'CAT',
      'DOG', 'SUN', 'DAY', 'SKY', 'TOP', 'RED', 'BIG', 'HOT', 'COLD', 'WARM',
      'RUN', 'SIT', 'EAT', 'DRINK', 'WALK', 'TALK', 'LOOK', 'PLAY', 'MAKE',
      'GIVE', 'TAKE', 'HOLD', 'LOVE', 'HOPE', 'DREAM', 'THINK', 'KNOW', 'WANT',
      'NEED', 'FEEL', 'WORK', 'HELP', 'STOP', 'START', 'LOOK', 'FIND', 'LOSE'
    ];
    
    // Different letter sets that can form words
    const letterSets = [
      'THEANDOREA',
      'CATDOGPET',
      'SUNMOONSTAR',
      'LOVEHOPEFAIR',
      'READWRITELIAR',
      'BLUEGREENRED',
      'PLAYGAMETIME',
      'LIFEDEATHBEAR',
      'WATERFIRESKY',
      'DREAMTHINKMAKE'
    ];
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    function createLetters() {
      letters = [];
      const selectedSet = letterSets[Math.floor(Math.random() * letterSets.length)];
      
      for (let i = 0; i < selectedSet.length; i++) {
        letters.push({
          char: selectedSet[i],
          x: width/2 + (Math.random() - 0.5) * 400,
          y: height/2 + (Math.random() - 0.5) * 400,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          radius: 25,
          baseRadius: 25,
          hovered: false,
          selected: false,
          history: []
        });
      }
    }
    
    function getDistance(a, b) {
      return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
    }
    
    function findNearestLetter(x, y, exclude = null) {
      let nearest = null;
      let minDist = 80;
      
      for (let letter of letters) {
        if (letter === exclude) continue;
        const dist = getDistance({x, y}, letter);
        if (dist < minDist) {
          minDist = dist;
          nearest = letter;
        }
      }
      
      return nearest;
    }
    
    function checkWord(word) {
      if (word.length < 2) return false;
      
      // Check against word bank
      if (wordBank.includes(word) && !foundWords.has(word)) {
        return true;
      }
      
      return false;
    }
    
    function showWord(word) {
      // Show floating word
      const reveal = document.createElement('div');
      reveal.className = 'word-reveal';
      reveal.textContent = word;
      reveal.style.left = width/2 + 'px';
      reveal.style.top = height/2 + 'px';
      document.body.appendChild(reveal);
      
      setTimeout(() => reveal.remove(), 1500);
      
      // Update score
      wordCount++;
      document.getElementById('word-count').textContent = wordCount;
      
      // Add to found words list
      foundWords.add(word);
      updateWordList();
      
      // Check for achievements
      checkAchievements();
    }
    
    function updateWordList() {
      const listEl = document.getElementById('word-list');
      const words = Array.from(foundWords).sort((a, b) => a.localeCompare(b));
      listEl.innerHTML = words.join('<br>');
    }
    
    const achievements = {
      first: { name: 'first taste', check: () => wordCount >= 1 },
      five: { name: 'soup starter', check: () => wordCount >= 5 },
      ten: { name: 'word chef', check: () => wordCount >= 10 },
      twenty: { name: 'soup master', check: () => wordCount >= 20 }
    };
    
    let shownAchievements = new Set();
    
    function checkAchievements() {
      for (let [key, ach] of Object.entries(achievements)) {
        if (ach.check() && !shownAchievements.has(key)) {
          showAchievement(ach.name);
          shownAchievements.add(key);
        }
      }
    }
    
    function showAchievement(name) {
      const ach = document.createElement('div');
      ach.className = 'achievement';
      ach.textContent = '🏆 ' + name;
      document.body.appendChild(ach);
      setTimeout(() => ach.remove(), 2000);
    }
    
    let mouseX = 0, mouseY = 0;
    
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Check hover
      for (let letter of letters) {
        letter.hovered = getDistance({x: mouseX, y: mouseY}, letter) < letter.radius;
      }
      
      // Drag logic
      if (isDragging && connectedLetters.length > 0) {
        const last = connectedLetters[connectedLetters.length - 1];
        
        // Check for new letter connection
        const nearest = findNearestLetter(mouseX, mouseY, last);
        if (nearest && !connectedLetters.includes(nearest)) {
          // Check if we can connect (not too far)
          if (getDistance(last, nearest) < 100) {
            connectedLetters.push(nearest);
            nearest.selected = true;
          }
        }
        
        // Build current word
        const currentWord = connectedLetters.map(l => l.char).join('');
        
        // Check if it's a valid word
        if (checkWord(currentWord)) {
          showWord(currentWord);
          
          // Clear selection
          connectedLetters.forEach(l => l.selected = false);
          connectedLetters = [];
        }
        
        // Update word display
        const display = document.getElementById('word-display');
        if (currentWord.length > 0) {
          display.textContent = currentWord;
          display.classList.add('active');
        } else {
          display.classList.remove('active');
        }
      }
    });
    
    canvas.addEventListener('mousedown', (e) => {
      // Find clicked letter
      for (let letter of letters) {
        if (letter.hovered) {
          isDragging = true;
          connectedLetters = [letter];
          letter.selected = true;
          dragStart = letter;
          
          // Show hint on first interaction
          if (!hintShown) {
            document.getElementById('hint').style.opacity = '0.3';
            setTimeout(() => {
              document.getElementById('hint').style.opacity = '0';
            }, 3000);
            hintShown = true;
          }
          
          break;
        }
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      if (isDragging) {
        connectedLetters.forEach(l => l.selected = false);
        connectedLetters = [];
        document.getElementById('word-display').classList.remove('active');
        document.getElementById('word-display').textContent = '';
      }
      isDragging = false;
    });
    
    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousedown', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      canvas.dispatchEvent(mouseEvent);
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      canvas.dispatchEvent(mouseEvent);
    });
    
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      canvas.dispatchEvent(new MouseEvent('mouseup'));
    });
    
    // Easter eggs!
    let clickCount = 0;
    document.getElementById('title').addEventListener('click', () => {
      clickCount++;
      if (clickCount === 10) {
        // Secret: spawn more letters
        for (let i = 0; i < 10; i++) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          letters.push({
            char: chars[Math.floor(Math.random() * chars.length)],
            x: width/2 + (Math.random() - 0.5) * 300,
            y: height/2 + (Math.random() - 0.5) * 300,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            radius: 25,
            baseRadius: 25,
            hovered: false,
            selected: false,
            history: []
          });
        }
        showAchievement('abundance!');
      }
    });
    
    // Double click to shuffle
    canvas.addEventListener('dblclick', () => {
      letters.forEach(l => {
        l.vx = (Math.random() - 0.5) * 2;
        l.vy = (Math.random() - 0.5) * 2;
      });
    });
    
    function update() {
      for (let letter of letters) {
        // Store history for trail effect
        letter.history.push({x: letter.x, y: letter.y});
        if (letter.history.length > 10) {
          letter.history.shift();
        }
        
        // Movement with boundaries
        letter.x += letter.vx;
        letter.y += letter.vy;
        
        // Gentle floating
        letter.vx += (Math.random() - 0.5) * 0.02;
        letter.vy += (Math.random() - 0.5) * 0.02;
        
        // Damping
        letter.vx *= 0.99;
        letter.vy *= 0.99;
        
        // Boundaries
        const margin = 100;
        if (letter.x < margin) letter.vx += 0.1;
        if (letter.x > width - margin) letter.vx -= 0.1;
        if (letter.y < margin) letter.vy += 0.1;
        if (letter.y > height - margin) letter.vy -= 0.1;
        
        // Hover effect
        const targetRadius = letter.hovered || letter.selected ? 35 : 25;
        letter.radius += (targetRadius - letter.radius) * 0.2;
      }
    }
    
    function draw() {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, width, height);
      
      // Draw connections
      if (connectedLetters.length > 1) {
        ctx.beginPath();
        ctx.moveTo(connectedLetters[0].x, connectedLetters[0].y);
        
        for (let i = 1; i < connectedLetters.length; i++) {
          ctx.lineTo(connectedLetters[i].x, connectedLetters[i].y);
        }
        
        // Draw line to mouse
        if (isDragging) {
          const last = connectedLetters[connectedLetters.length - 1];
          ctx.lineTo(mouseX, mouseY);
        }
        
        ctx.strokeStyle = '#ff6b35';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        
        // Glow effect
        ctx.shadowColor = '#ff6b35';
        ctx.shadowBlur = 20;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      
      // Draw letters
      for (let letter of letters) {
        // Draw trail
        if (letter.selected) {
          ctx.beginPath();
          for (let i = 0; i < letter.history.length; i++) {
            const point = letter.history[i];
            const alpha = i / letter.history.length * 0.3;
            ctx.globalAlpha = alpha;
            ctx.arc(point.x, point.y, letter.radius * 0.8, 0, Math.PI * 2);
          }
          ctx.fillStyle = '#ff6b35';
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        
        // Draw letter circle
        ctx.beginPath();
        ctx.arc(letter.x, letter.y, letter.radius, 0, Math.PI * 2);
        
        if (letter.selected) {
          ctx.fillStyle = '#ff6b35';
          ctx.shadowColor = '#ff6b35';
          ctx.shadowBlur = 30;
        } else if (letter.hovered) {
          ctx.fillStyle = '#222';
          ctx.strokeStyle = '#ff6b35';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = '#111';
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Draw letter
        ctx.fillStyle = letter.selected ? '#0a0a0a' : '#f5f5f5';
        ctx.font = '600 24px Instrument Sans, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(letter.char, letter.x, letter.y);
      }
    }
    
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    
    // Initialize
    window.addEventListener('resize', resize);
    resize();
    createLetters();
    loop();
  </script>
</body>
</html>
