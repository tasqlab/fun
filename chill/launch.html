<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slingshot Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-orange: #f97316;
            --accent-cyan: #06b6d4;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        /* Game Canvas */
        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Sky gradient */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, 
                #0c1929 0%, 
                #1e3a5f 40%, 
                #3d6b8c 70%, 
                #5b8fa8 100%
            );
        }

        /* Stars */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Ground/Terrain */
        .terrain {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 200px;
        }

        /* Slingshot */
        #slingshot {
            position: absolute;
            bottom: 180px;
            left: 80px;
            width: 60px;
            height: 120px;
            z-index: 10;
        }

        .slingshot-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100px;
            background: linear-gradient(90deg, #78350f 0%, #92400e 50%, #78350f 100%);
            border-radius: 4px 4px 0 0;
        }

        .slingshot-fork {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            border: 8px solid #92400e;
            border-bottom: none;
            border-radius: 30px 30px 0 0;
        }

        .slingshot-band {
            position: absolute;
            top: 25px;
            width: 8px;
            background: #dc2626;
            transform-origin: top center;
            border-radius: 4px;
            z-index: -1;
        }

        .slingshot-band.left {
            left: 22px;
            height: 80px;
            transform: rotate(-30deg);
        }

        .slingshot-band.right {
            right: 22px;
            height: 80px;
            transform: rotate(30deg);
        }

        /* Character */
        #character {
            position: absolute;
            width: 40px;
            height: 40px;
            z-index: 20;
            transition: transform 0.1s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .character-body {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: bounce 0.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Trajectory line */
        #trajectory {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* UI Panels */
        .ui-panel {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
        }

        /* Control Panel - Top Right */
        #control-panel {
            top: 20px;
            right: 20px;
            width: 280px;
        }

        #control-panel h2 {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .control-label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .control-value {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            font-weight: 700;
            min-width: 50px;
            text-align: right;
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-pink));
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Launch Button */
        #launch-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        #launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(249, 115, 22, 0.4);
        }

        #launch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Stats Panel - Top Left */
        #stats-panel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* Character Selector - Bottom */
        #character-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px 16px;
        }

        .char-btn {
            width: 50px;
            height: 50px;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-btn:hover {
            border-color: var(--accent-orange);
            transform: scale(1.1);
        }

        .char-btn.active {
            border-color: var(--accent-orange);
            background: rgba(249, 115, 22, 0.2);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
        }

        /* Distance Markers */
        .distance-marker {
            position: absolute;
            bottom: 180px;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
        }

        .marker-line {
            width: 2px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto;
        }

        .marker-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Landing Effect */
        .landing-dust {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.6) 0%, transparent 70%);
            pointer-events: none;
            animation: dustFade 0.8s ease-out forwards;
        }

        @keyframes dustFade {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Best Distance Modal */
        #best-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--accent-green);
            border-radius: 24px;
            padding: 32px 48px;
            text-align: center;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #best-modal.show {
            transform: translate(-50%, -50%) scale(1);
        }

        #best-modal h2 {
            font-size: 1.8rem;
            color: var(--accent-green);
            margin-bottom: 8px;
        }

        #best-modal .emoji {
            font-size: 4rem;
            margin: 16px 0;
        }

        #best-modal .distance {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        #best-modal .previous-best {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 24px;
        }

        #best-modal button {
            padding: 12px 32px;
            background: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #best-modal button:hover {
            transform: scale(1.05);
        }

        /* Tutorial hint */
        .hint {
            position: absolute;
            bottom: 100px;
            left: 80px;
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(20px);
        }

        /* Sun/Moon */
        .celestial {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 60px currentColor;
        }

        .sun {
            top: 40px;
            right: 100px;
            width: 60px;
            height: 60px;
            background: #fbbf24;
            color: rgba(251, 191, 36, 0.3);
        }

        .moon {
            top: 60px;
            left: 150px;
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            color: rgba(226, 232, 240, 0.2);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Sky Background -->
        <div class="sky"></div>
        
        <!-- Stars -->
        <div class="stars" id="stars"></div>
        
        <!-- Celestial bodies -->
        <div class="celestial sun"></div>
        <div class="celestial moon"></div>
        
        <!-- Clouds -->
        <div class="cloud" style="top: 80px; left: 20%; width: 120px; height: 40px;"></div>
        <div class="cloud" style="top: 120px; left: 60%; width: 100px; height: 35px;"></div>
        <div class="cloud" style="top: 60px; left: 80%; width: 80px; height: 30px;"></div>

        <!-- Terrain Canvas -->
        <canvas id="terrain-canvas"></canvas>

        <!-- Trajectory Canvas -->
        <canvas id="trajectory"></canvas>

        <!-- Slingshot -->
        <div id="slingshot">
            <div class="slingshot-fork"></div>
            <div class="slingshot-base"></div>
            <div class="slingshot-band left" id="band-left"></div>
            <div class="slingshot-band right" id="band-right"></div>
        </div>

        <!-- Character -->
        <div id="character" class="hidden">
            <div class="character-body" id="char-body">🧍</div>
        </div>

        <!-- Distance Markers Container -->
        <div id="markers-container"></div>

        <!-- UI Panels -->
        <div class="ui-panel" id="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Current Distance</span>
                <span class="stat-value" id="current-dist">0 m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Best Distance</span>
                <span class="stat-value" id="best-dist">0 m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Max Height</span>
                <span class="stat-value" id="max-height">0 m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Launches</span>
                <span class="stat-value" id="launches">0</span>
            </div>
        </div>

        <div class="ui-panel" id="control-panel">
            <h2>🎯 Launch Controls</h2>
            
            <div class="control-row">
                <span class="control-label">Angle</span>
                <input type="range" id="angle-slider" min="10" max="80" value="45">
                <span class="control-value" id="angle-value">45°</span>
            </div>
            
            <div class="control-row">
                <span class="control-label">Power</span>
                <input type="range" id="power-slider" min="20" max="100" value="70">
                <span class="control-value" id="power-value">70%</span>
            </div>

            <button id="launch-btn">🚀 Launch!</button>
        </div>

        <div class="ui-panel" id="character-panel">
            <button class="char-btn active" data-char="🧍">🧍</button>
            <button class="char-btn" data-char="🏃">🏃</button>
            <button class="char-btn" data-char="🦸">🦸</button>
            <button class="char-btn" data-char="🤖">🤖</button>
            <button class="char-btn" data-char="🦖">🦖</button>
            <button class="char-btn" data-char="👽">👽</button>
        </div>

        <div class="hint" id="hint">
            <span>🎯</span> Drag character back to aim, release to launch!
        </div>
    </div>

    <div id="best-modal">
        <h2>🏆 NEW RECORD!</h2>
        <div class="emoji" id="modal-emoji">🎉</div>
        <div class="distance" id="modal-distance">0 m</div>
        <div class="previous-best">Previous best: <span id="prev-best">0 m</span></div>
        <button onclick="closeModal()">Launch Again</button>
    </div>

    <script>
        // Game State
        const game = {
            angle: 45,
            power: 70,
            selectedChar: '🧍',
            isDragging: false,
            isFlying: false,
            bestDistance: 0,
            launchCount: 0,
            character: null,
            velocity: { x: 0, y: 0 },
            position: { x: 0, y: 0 },
            maxHeight: 0,
            terrainPoints: []
        };

        // Canvas setup
        const terrainCanvas = document.getElementById('terrain-canvas');
        const terrainCtx = terrainCanvas.getContext('2d');
        const trajectoryCanvas = document.getElementById('trajectory');
        const trajectoryCtx = trajectoryCanvas.getContext('2d');

        function resizeCanvases() {
            terrainCanvas.width = window.innerWidth;
            terrainCanvas.height = window.innerHeight;
            trajectoryCanvas.width = window.innerWidth;
            trajectoryCanvas.height = window.innerHeight;
            
            generateTerrain();
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // Generate terrain
        function generateTerrain() {
            const width = terrainCanvas.width * 2; // Extra for scrolling
            const height = terrainCanvas.height;
            game.terrainPoints = [];
            
            let y = height - 180;
            const baseY = y;
            
            // Generate terrain with hills and valleys
            for (let x = 0; x <= width; x += 10) {
                const noise = Math.sin(x * 0.005) * 30 + 
                             Math.sin(x * 0.015) * 20 + 
                             Math.sin(x * 0.003) * 40;
                y = baseY + noise;
                game.terrainPoints.push({ x, y });
            }
            
            drawTerrain();
        }

        function drawTerrain() {
            terrainCtx.clearRect(0, 0, terrainCanvas.width, terrainCanvas.height);
            
            const startX = game.isFlying ? Math.max(0, game.position.x - window.innerWidth/2) : 0;
            
            // Draw terrain
            terrainCtx.beginPath();
            terrainCtx.moveTo(0, terrainCanvas.height);
            
            game.terrainPoints.forEach((point, i) => {
                if (i === 0) {
                    terrainCtx.lineTo(point.x - startX, point.y);
                } else {
                    terrainCtx.lineTo(point.x - startX, point.y);
                }
            });
            
            terrainCtx.lineTo(terrainCanvas.width, terrainCanvas.height);
            terrainCtx.closePath();
            
            // Gradient fill
            const gradient = terrainCtx.createLinearGradient(0, terrainCanvas.height - 250, 0, terrainCanvas.height);
            gradient.addColorStop(0, '#3d5a45');
            gradient.addColorStop(0.3, '#2d4a35');
            gradient.addColorStop(1, '#1a2e20');
            terrainCtx.fillStyle = gradient;
            terrainCtx.fill();
            
            // Grass line
            terrainCtx.beginPath();
            game.terrainPoints.forEach((point, i) => {
                if (i === 0) {
                    terrainCtx.moveTo(point.x - startX, point.y);
                } else {
                    terrainCtx.lineTo(point.x - startX, point.y);
                }
            });
            terrainCtx.strokeStyle = '#4a7c59';
            terrainCtx.lineWidth = 4;
            terrainCtx.stroke();
            
            // Draw trees
            drawTrees(startX);
        }

        function drawTrees(startX) {
            const treePositions = [100, 300, 500, 800, 1100, 1400, 1700, 2000, 2500, 3000];
            
            treePositions.forEach(x => {
                if (x > startX - 100 && x < startX + window.innerWidth + 100) {
                    const screenX = x - startX;
                    const terrainY = getTerrainY(x);
                    const treeHeight = 30 + Math.random() * 40;
                    
                    // Trunk
                    terrainCtx.fillStyle = '#5c4033';
                    terrainCtx.fillRect(screenX - 5, terrainY - treeHeight * 0.4, 10, treeHeight * 0.4);
                    
                    // Foliage
                    terrainCtx.fillStyle = '#2d5a3d';
                    terrainCtx.beginPath();
                    terrainCtx.arc(screenX, terrainY - treeHeight * 0.6, treeHeight * 0.5, 0, Math.PI * 2);
                    terrainCtx.fill();
                }
            });
        }

        function getTerrainY(x) {
            for (let i = 0; i < game.terrainPoints.length - 1; i++) {
                if (x >= game.terrainPoints[i].x && x < game.terrainPoints[i + 1].x) {
                    const t = (x - game.terrainPoints[i].x) / (game.terrainPoints[i + 1].x - game.terrainPoints[i].x);
                    return game.terrainPoints[i].y + t * (game.terrainPoints[i + 1].y - game.terrainPoints[i].y);
                }
            }
            return terrainCanvas.height - 180;
        }

        // Character position
        const slingshotX = 110;
        const slingshotY = window.innerHeight - 295;
        game.position = { x: slingshotX, y: slingshotY };

        const characterEl = document.getElementById('character');
        characterEl.style.left = slingshotX - 20 + 'px';
        characterEl.style.top = slingshotY - 20 + 'px';

        // Drag handling
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };

        characterEl.addEventListener('mousedown', startDrag);
        characterEl.addEventListener('touchstart', startDrag);

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag);

        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (game.isFlying) return;
            
            game.isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            dragStart = { x: touch.clientX, y: touch.clientY };
            dragCurrent = { ...dragStart };
            
            characterEl.style.transition = 'none';
            document.getElementById('hint').style.display = 'none';
        }

        function drag(e) {
            if (!game.isDragging) return;
            
            const touch = e.touches ? e.touches[0] : e;
            dragCurrent = { x: touch.clientX, y: touch.clientY };
            
            const dx = dragCurrent.x - dragStart.x;
            const dy = dragCurrent.y - dragStart.y;
            
            // Limit drag distance
            const maxDrag = 100;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const limitedDist = Math.min(dist, maxDrag);
            const angle = Math.atan2(dy, dx);
            
            const clampedX = slingshotX + Math.cos(angle) * limitedDist;
            const clampedY = slingshotY + Math.sin(angle) * limitedDist;
            
            // Clamp so you can only pull back (left and down)
            const finalX = Math.min(clampedX, slingshotX);
            const finalY = Math.max(clampedY, slingshotY);
            
            characterEl.style.left = finalX - 20 + 'px';
            characterEl.style.top = finalY - 20 + 'px';
            
            // Update bands
            updateBands(finalX, finalY);
            
            // Draw trajectory preview
            drawTrajectoryPreview(slingshotX - finalX, slingshotY - finalY);
        }

        function endDrag() {
            if (!game.isDragging) return;
            
            game.isDragging = false;
            
            const dx = slingshotX - (parseFloat(characterEl.style.left) + 20);
            const dy = slingshotY - (parseFloat(characterEl.style.top) + 20);
            
            const power = game.power / 25;
            const velocity = Math.sqrt(dx * dx + dy * dy) * power * 0.5;
            const angleRad = game.angle * Math.PI / 180;
            
            game.velocity = {
                x: Math.cos(angleRad) * velocity,
                y: -Math.sin(angleRad) * velocity
            };
            
            // Launch!
            if (velocity > 2) {
                launch();
            } else {
                resetCharacter();
            }
            
            // Clear trajectory
            trajectoryCtx.clearRect(0, 0, trajectoryCanvas.width, trajectoryCanvas.height);
        }

        function updateBands(charX, charY) {
            const leftBand = document.getElementById('band-left');
            const rightBand = document.getElementById('band-right');
            
            // Calculate stretch
            const dx = charX - slingshotX;
            const dy = charY - slingshotY;
            const stretch = Math.sqrt(dx * dx + dy * dy);
            
            leftBand.style.height = (80 + stretch * 0.8) + 'px';
            leftBand.style.transform = `rotate(${-30 + dx * 0.3}deg)`;
            
            rightBand.style.height = (80 + stretch * 0.8) + 'px';
            rightBand.style.transform = `rotate(${30 + dx * 0.3}deg)`;
        }

        function drawTrajectoryPreview(vx, vy) {
            trajectoryCtx.clearRect(0, 0, trajectoryCanvas.width, trajectoryCanvas.height);
            
            const power = game.power / 25;
            const steps = 30;
            
            trajectoryCtx.beginPath();
            trajectoryCtx.setLineDash([5, 5]);
            
            let px = slingshotX;
            let py = slingshotY;
            let pvx = Math.cos(game.angle * Math.PI / 180) * Math.sqrt(vx * vx + vy * vy) * power * 3;
            let pvy = -Math.sin(game.angle * Math.PI / 180) * Math.sqrt(vx * vx + vy * vy) * power * 3;
            
            trajectoryCtx.moveTo(px, py);
            
            for (let i = 0; i < steps; i++) {
                pvy += 0.3; // Gravity
                px += pvx;
                py += pvy;
                
                if (py > getTerrainY(game.isFlying ? px + (game.position.x - window.innerWidth/2) : px)) {
                    break;
                }
                
                trajectoryCtx.lineTo(px, py);
            }
            
            trajectoryCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            trajectoryCtx.lineWidth = 2;
            trajectoryCtx.stroke();
            trajectoryCtx.setLineDash([]);
        }

        function launch() {
            game.isFlying = true;
            game.launchCount++;
            game.maxHeight = 0;
            characterEl.classList.remove('hidden');
            
            document.getElementById('launch-btn').disabled = true;
            document.getElementById('launches').textContent = game.launchCount;
            
            // Reset bands
            document.getElementById('band-left').style.height = '80px';
            document.getElementById('band-left').style.transform = 'rotate(-30deg)';
            document.getElementById('band-right').style.height = '80px';
            document.getElementById('band-right').style.transform = 'rotate(30deg)';
            
            gameLoop();
        }

        function gameLoop() {
            if (!game.isFlying) return;
            
            // Physics
            game.velocity.y += 0.35; // Gravity
            game.position.x += game.velocity.x;
            game.position.y += game.velocity.y;
            
            // Track max height
            const screenY = window.innerHeight - game.position.y;
            if (screenY > game.maxHeight) {
                game.maxHeight = screenY;
            }
            
            // Update character position (relative to camera)
            const cameraX = Math.max(0, game.position.x - window.innerWidth / 3);
            characterEl.style.left = (game.position.x - cameraX - 20) + 'px';
            characterEl.style.top = (window.innerHeight - game.position.y - 20) + 'px';
            
            // Update terrain position
            terrainCanvas.style.transform = `translateX(-${cameraX}px)`;
            
            // Check collision with terrain
            const terrainY = getTerrainY(game.position.x);
            const screenPosY = window.innerHeight - game.position.y;
            
            if (screenPosY >= terrainY - 10) {
                // Landed!
                land();
                return;
            }
            
            // Update stats
            const distance = Math.max(0, Math.floor(game.position.x - slingshotX));
            document.getElementById('current-dist').textContent = distance + ' m';
            document.getElementById('max-height').textContent = Math.floor(game.maxHeight) + ' m';
            
            // Update distance markers
            updateDistanceMarkers(cameraX);
            
            requestAnimationFrame(gameLoop);
        }

        function land() {
            game.isFlying = false;
            
            const distance = Math.max(0, Math.floor(game.position.x - slingshotX));
            
            // Create landing dust effect
            createDustEffect(game.position.x, getTerrainY(game.position.x));
            
            // Check for new best
            if (distance > game.bestDistance) {
                game.bestDistance = distance;
                document.getElementById('best-dist').textContent = distance + ' m';
                showBestModal(distance);
            }
            
            // Reset after delay
            setTimeout(() => {
                resetCharacter();
                document.getElementById('launch-btn').disabled = false;
            }, 1500);
        }

        function createDustEffect(x, y) {
            const dust = document.createElement('div');
            dust.className = 'landing-dust';
            dust.style.left = (x - 40) + 'px';
            dust.style.top = (y - 80) + 'px';
            document.getElementById('game-container').appendChild(dust);
            
            setTimeout(() => dust.remove(), 1000);
        }

        function showBestModal(distance) {
            document.getElementById('modal-emoji').textContent = getCelebrationEmoji(distance);
            document.getElementById('modal-distance').textContent = distance + ' m';
            document.getElementById('prev-best').textContent = (distance - Math.floor(Math.random() * 50 + 20)) + ' m';
            document.getElementById('best-modal').classList.add('show');
        }

        function getCelebrationEmoji(distance) {
            if (distance > 5000) return '🌟';
            if (distance > 3000) return '🚀';
            if (distance > 2000) return '💫';
            if (distance > 1000) return '🎯';
            return '🎉';
        }

        function closeModal() {
            document.getElementById('best-modal').classList.remove('show');
        }

        function resetCharacter() {
            game.position = { x: slingshotX, y: slingshotY };
            game.velocity = { x: 0, y: 0 };
            
            characterEl.style.left = slingshotX - 20 + 'px';
            characterEl.style.top = slingshotY - 20 + 'px';
            characterEl.style.transition = 'all 0.3s ease-out';
            
            terrainCanvas.style.transform = 'translateX(0)';
            
            document.getElementById('current-dist').textContent = '0 m';
            document.getElementById('max-height').textContent = '0 m';
            
            // Clear markers
            document.getElementById('markers-container').innerHTML = '';
        }

        // Distance markers
        function updateDistanceMarkers(cameraX) {
            const container = document.getElementById('markers-container');
            const markers = [500, 1000, 2000, 3000, 5000, 7000, 10000];
            
            container.innerHTML = '';
            
            markers.forEach(dist => {
                const x = slingshotX + dist;
                if (x > cameraX && x < cameraX + window.innerWidth) {
                    const marker = document.createElement('div');
                    marker.className = 'distance-marker';
                    marker.style.left = (x - cameraX) + 'px';
                    
                    let label = dist >= 1000 ? (dist/1000).toFixed(1) + ' km' : dist + ' m';
                    if (dist >= 10000) label = (dist/1000).toFixed(0) + ' km';
                    
                    marker.innerHTML = `
                        <div class="marker-line"></div>
                        <div class="marker-label">${label}</div>
                    `;
                    
                    container.appendChild(marker);
                }
            });
        }

        // Controls
        document.getElementById('angle-slider').addEventListener('input', (e) => {
            game.angle = parseInt(e.target.value);
            document.getElementById('angle-value').textContent = game.angle + '°';
        });

        document.getElementById('power-slider').addEventListener('input', (e) => {
            game.power = parseInt(e.target.value);
            document.getElementById('power-value').textContent = game.power + '%';
        });

        document.getElementById('launch-btn').addEventListener('click', () => {
            if (!game.isFlying) {
                // Quick launch without dragging
                const angleRad = game.angle * Math.PI / 180;
                const velocity = game.power * 0.8;
                
                game.velocity = {
                    x: Math.cos(angleRad) * velocity,
                    y: -Math.sin(angleRad) * velocity
                };
                
                launch();
            }
        });

        // Character selection
        document.querySelectorAll('.char-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                game.selectedChar = btn.dataset.char;
                document.getElementById('char-body').textContent = game.selectedChar;
            });
        });

        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }

        // Initialize
        drawTerrain();
    </script>
</body>
</html>
