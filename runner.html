<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rush - Endless Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a0a0f;
            --secondary: #00ff88;
            --accent: #00d4ff;
            --warning: #ff2d75;
            --text: #ffffff;
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.6);
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.6);
            --glow-pink: 0 0 20px rgba(255, 45, 117, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--primary);
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }

        /* Game Canvas */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            border: 2px solid var(--secondary);
            box-shadow: var(--glow-green), inset 0 0 50px rgba(0, 255, 136, 0.1);
        }

        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .score-display {
            position: absolute;
            top: 30px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--secondary);
            text-shadow: var(--glow-green);
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 3px;
        }

        .score-value {
            font-size: 2.5rem;
            font-weight: 900;
        }

        .high-score {
            position: absolute;
            top: 30px;
            right: 30px;
            text-align: right;
            font-family: 'Orbitron', sans-serif;
        }

        .high-score .score-label {
            color: var(--warning);
        }

        .high-score .score-value {
            color: var(--warning);
            text-shadow: var(--glow-pink);
            font-size: 1.8rem;
        }

        /* Start Screen */
        .start-screen {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .start-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--secondary);
            text-shadow: var(--glow-green), 0 0 60px rgba(0, 255, 136, 0.4);
            margin-bottom: 20px;
            letter-spacing: 8px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 50px;
            letter-spacing: 4px;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 20px 60px;
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover {
            background: var(--secondary);
            color: var(--primary);
            box-shadow: var(--glow-green);
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .instructions {
            margin-top: 40px;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
            line-height: 2;
        }

        .instructions span {
            color: var(--accent);
            font-weight: 700;
        }

        /* Game Over Screen */
        .game-over {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .game-over.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--warning);
            text-shadow: var(--glow-pink);
            margin-bottom: 20px;
            letter-spacing: 6px;
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        .final-score span {
            color: var(--secondary);
            font-size: 2.5rem;
            font-weight: 900;
        }

        .new-high-score {
            color: var(--warning);
            font-size: 1.2rem;
            margin-bottom: 40px;
            animation: flash 0.5s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--secondary);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Speed indicator */
        .speed-indicator {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .speed-bar {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            border-radius: 4px;
            transition: width 0.3s;
            box-shadow: var(--glow-green);
        }

        /* Mobile controls */
        .mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
        }

        @media (max-width: 768px) {
            canvas {
                width: 100%;
                height: auto;
            }
            .mobile-controls {
                display: flex;
            }
            .game-title {
                font-size: 2.5rem;
            }
        }

        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-btn:active {
            background: var(--secondary);
            color: var(--primary);
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <div class="score-display">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="scoreValue">0</div>
            </div>
            
            <div class="high-score">
                <div class="score-label">BEST</div>
                <div class="score-value" id="highScoreValue">0</div>
            </div>

            <div class="speed-indicator">
                SPEED
                <div class="speed-bar">
                    <div class="speed-fill" id="speedFill"></div>
                </div>
            </div>

            <div class="mobile-controls">
                <button class="mobile-btn" id="jumpBtn">⬆️</button>
            </div>
        </div>

        <div class="start-screen" id="startScreen">
            <h1 class="game-title">NEON RUSH</h1>
            <p class="game-subtitle">ENDLESS RUNNER</p>
            <button class="start-btn" id="startBtn">START GAME</button>
            <div class="instructions">
                <span>SPACE</span> or <span>TAP</span> to jump<br>
                Avoid obstacles and run as far as you can!
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="new-high-score" id="newHighScore" style="display: none;">🎉 NEW HIGH SCORE! 🎉</div>
            <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = 800;
        canvas.height = 400;

        // DOM elements
        const scoreValue = document.getElementById('scoreValue');
        const highScoreValue = document.getElementById('highScoreValue');
        const startScreen = document.getElementById('startScreen');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const newHighScore = document.getElementById('newHighScore');
        const speedFill = document.getElementById('speedFill');

        // Game state
        let gameState = {
            isPlaying: false,
            score: 0,
            highScore: parseInt(localStorage.getItem('neonRushHighScore')) || 0,
            speed: 6,
            baseSpeed: 6,
            maxSpeed: 15,
            distance: 0
        };

        // Player
        const player = {
            x: 100,
            y: 300,
            width: 40,
            height: 60,
            velocityY: 0,
            isJumping: false,
            jumpForce: -15,
            gravity: 0.8,
            groundY: 300,
            color: '#00ff88',
            trail: []
        };

        // Obstacles
        let obstacles = [];
        let obstacleTimer = 0;
        let minObstacleGap = 60;
        let maxObstacleGap = 120;

        // Ground stars (background)
        let groundStars = [];
        for (let i = 0; i < 50; i++) {
            groundStars.push({
                x: Math.random() * canvas.width,
                y: 320 + Math.random() * 60,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        // Particles
        let particles = [];

        // Update high score display
        highScoreValue.textContent = gameState.highScore;

        // Draw functions
        function drawPlayer() {
            // Draw trail
            player.trail.forEach((pos, i) => {
                const alpha = (i + 1) / player.trail.length * 0.5;
                ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
                ctx.fillRect(pos.x, pos.y + 10, player.width - 10, player.height - 20);
            });

            // Draw player body (neon glow effect)
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            
            // Main body
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Inner glow
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 10, player.y + 10, player.width - 20, player.height - 20);
            
            // Eyes
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(player.x + 25, player.y + 15, 8, 8);
            
            ctx.shadowBlur = 0;
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff2d75';
                
                // Main spike
                ctx.fillStyle = '#ff2d75';
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.height);
                ctx.lineTo(obs.x + obs.width / 2, obs.y);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                ctx.closePath();
                ctx.fill();
                
                // Glow
                ctx.fillStyle = 'rgba(255, 45, 117, 0.5)';
                ctx.fillRect(obs.x - 5, obs.y - 5, obs.width + 10, obs.height + 10);
                
                ctx.shadowBlur = 0;
            });
        }

        function drawGround() {
            // Ground line
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff88';
            ctx.beginPath();
            ctx.moveTo(0, player.groundY + player.height);
            ctx.lineTo(canvas.width, player.groundY + player.height);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Grid effect
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                const offset = (gameState.distance * 0.5) % 40;
                ctx.beginPath();
                ctx.moveTo(i - offset, player.groundY + player.height);
                ctx.lineTo(i - offset - 30, canvas.height);
                ctx.stroke();
            }
        }

        function drawBackground() {
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a0f');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground stars
            groundStars.forEach(star => {
                ctx.fillStyle = 'rgba(0, 212, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Top decoration lines
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                const y = 50 + i * 30;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawParticles() {
            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(0, 255, 136, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Update functions
        function updatePlayer() {
            // Apply gravity
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            // Ground collision
            if (player.y >= player.groundY) {
                player.y = player.groundY;
                player.velocityY = 0;
                player.isJumping = false;
            }

            // Update trail
            if (gameState.isPlaying) {
                player.trail.push({ x: player.x, y: player.y });
                if (player.trail.length > 8) {
                    player.trail.shift();
                }
            }
        }

        function updateObstacles() {
            // Move obstacles
            obstacles.forEach(obs => {
                obs.x -= gameState.speed;
            });

            // Remove off-screen obstacles
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            // Spawn new obstacles
            obstacleTimer++;
            const gap = minObstacleGap + Math.random() * (maxObstacleGap - minObstacleGap);
            
            if (obstacleTimer > gap) {
                const height = 30 + Math.random() * 40;
                obstacles.push({
                    x: canvas.width + 50,
                    y: player.groundY + player.height - height,
                    width: 30,
                    height: height
                });
                obstacleTimer = 0;
            }
        }

        function updateGroundStars() {
            groundStars.forEach(star => {
                star.x -= star.speed * gameState.speed * 0.3;
                if (star.x < 0) {
                    star.x = canvas.width;
                }
            });
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x -= gameState.speed * 0.5;
                p.y += p.velocityY;
                p.velocityY += 0.1;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function checkCollisions() {
            const playerBox = {
                x: player.x + 10,
                y: player.y + 10,
                width: player.width - 20,
                height: player.height - 10
            };

            for (let obs of obstacles) {
                // Triangle collision (simplified as rectangle)
                const obsBox = {
                    x: obs.x + 5,
                    y: obs.y + 5,
                    width: obs.width - 10,
                    height: obs.height - 5
                };

                if (playerBox.x < obsBox.x + obsBox.width &&
                    playerBox.x + playerBox.width > obsBox.x &&
                    playerBox.y < obsBox.y + obsBox.height &&
                    playerBox.y + playerBox.height > obsBox.y) {
                    return true;
                }
            }
            return false;
        }

        function createJumpParticles() {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.groundY + player.height,
                    size: Math.random() * 4 + 2,
                    velocityY: -Math.random() * 3 - 1,
                    life: 1
                });
            }
        }

        function jump() {
            if (!player.isJumping && gameState.isPlaying) {
                player.velocityY = player.jumpForce;
                player.isJumping = true;
                createJumpParticles();
            }
        }

        function updateScore() {
            gameState.distance += gameState.speed;
            gameState.score = Math.floor(gameState.distance / 10);
            scoreValue.textContent = gameState.score;

            // Increase speed over time
            if (gameState.speed < gameState.maxSpeed) {
                gameState.speed += 0.001;
            }

            // Update speed indicator
            const speedPercent = ((gameState.speed - gameState.baseSpeed) / (gameState.maxSpeed - gameState.baseSpeed)) * 100;
            speedFill.style.width = speedPercent + '%';
        }

        function gameOverFunc() {
            gameState.isPlaying = false;
            
            // Check high score
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('neonRushHighScore', gameState.highScore);
                highScoreValue.textContent = gameState.highScore;
                newHighScore.style.display = 'block';
            } else {
                newHighScore.style.display = 'none';
            }

            finalScore.textContent = gameState.score;
            gameOver.classList.add('show');
        }

        function resetGame() {
            gameState.score = 0;
            gameState.distance = 0;
            gameState.speed = gameState.baseSpeed;
            
            player.y = player.groundY;
            player.velocityY = 0;
            player.isJumping = false;
            player.trail = [];
            
            obstacles = [];
            obstacleTimer = 0;
            particles = [];
            
            scoreValue.textContent = '0';
            speedFill.style.width = '0%';
        }

        function startGame() {
            resetGame();
            gameState.isPlaying = true;
            startScreen.classList.add('hidden');
            gameOver.classList.remove('show');
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            if (gameState.isPlaying) {
                // Update
                updatePlayer();
                updateObstacles();
                updateGroundStars();
                updateParticles();
                updateScore();

                // Check collisions
                if (checkCollisions()) {
                    gameOverFunc();
                }
            }

            // Draw
            drawGround();
            drawObstacles();
            drawPlayer();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameState.isPlaying && !startScreen.classList.contains('hidden')) {
                    startGame();
                } else if (gameOver.classList.contains('show')) {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        // Touch/click controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        canvas.addEventListener('click', () => {
            if (gameState.isPlaying) {
                jump();
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Mobile controls
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
