<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Bouncer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0; /* Soft neutral background */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin: 0;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        #counter {
            font-size: 40px;
            font-weight: bold;
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
    <!-- Import Matter.js for Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <h1>Infinite Bouncer</h1>
        <p>Click anywhere to spawn a ball.</p>
        <div id="counter">0</div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#1A535C', '#FF9F1C'];
    
    // --- MATTER.JS SETUP ---
    const Engine = Matter.Engine,
          Render = Matter.Render,
          Runner = Matter.Runner,
          Bodies = Matter.Bodies,
          Composite = Matter.Composite,
          Mouse = Matter.Mouse,
          MouseConstraint = Matter.MouseConstraint,
          Events = Matter.Events;

    // Create engine
    const engine = Engine.create();
    const world = engine.world;

    // Create renderer
    const render = Render.create({
        element: document.getElementById('game-container'),
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false, // Important for solid colors
            background: '#f0f0f0'
        }
    });

    // --- GAME LOGIC ---

    let ballCount = 0;
    const counterElement = document.getElementById('counter');

    // Add boundaries (Walls)
    function addBoundaries() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const wallThickness = 60;

        const ground = Bodies.rectangle(width/2, height + wallThickness/2 - 10, width, wallThickness, { isStatic: true, render: { fillStyle: '#333' } });
        const leftWall = Bodies.rectangle(0 - wallThickness/2, height/2, wallThickness, height, { isStatic: true });
        const rightWall = Bodies.rectangle(width + wallThickness/2, height/2, wallThickness, height, { isStatic: true });

        Composite.add(world, [ground, leftWall, rightWall]);
    }

    // Spawn a ball
    function spawnBall(x, y) {
        const size = Math.random() * 30 + 20; // Random size between 20 and 50
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        
        const ball = Bodies.circle(x, y, size, {
            restitution: 0.9, // Bounciness (0-1)
            friction: 0.005,
            render: {
                fillStyle: color,
                strokeStyle: '#000',
                lineWidth: 2
            }
        });

        Composite.add(world, ball);
        ballCount++;
        counterElement.innerText = ballCount;
    }

    // Handle Clicks
    document.addEventListener('mousedown', (e) => {
        // Don't spawn if clicking UI (though pointer-events:none handles most)
        spawnBall(e.clientX, e.clientY);
    });

    // Add Mouse Control (Drag and Throw)
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: {
            stiffness: 0.2,
            render: { visible: false }
        }
    });
    Composite.add(world, mouseConstraint);
    render.mouse = mouse; // Keep mouse in sync with rendering

    // --- INITIALIZATION ---
    addBoundaries();
    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // Handle Window Resize
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
        // Note: In a full game, you'd need to reposition walls here
        location.reload(); // Simple hack for this demo
    });

</script>
</body>
</html>
