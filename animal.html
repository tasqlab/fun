<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Evolution Combiner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #12121a;
            --bg-elevated: #1a1a25;
            --bg-slot: #0f0f18;
            --accent-gold: #fbbf24;
            --accent-cyan: #22d3ee;
            --accent-green: #4ade80;
            --accent-purple: #c084fc;
            --accent-red: #f87171;
            --accent-pink: #f472b6;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255,255,255,0.08);
            --border-glow: rgba(251, 191, 36, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            min-height: 100vh;
            user-select: none;
        }
        
        #game-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }
        
        /* Header */
        header {
            grid-column: 1 / -1;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .progress-display { display: flex; align-items: center; gap: 16px; }
        
        .discovered-count {
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
        }
        
        /* Main Play Area */
        #play-area {
            position: relative;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(192, 132, 252, 0.05) 0%, transparent 40%),
                var(--bg-dark);
            padding: 24px;
            overflow: auto;
        }
        
        /* Grid System */
        #combiner-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .grid-slot {
            aspect-ratio: 1;
            background: var(--bg-slot);
            border: 2px dashed var(--border-subtle);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .grid-slot:hover { border-color: var(--accent-gold); background: rgba(251, 191, 36, 0.05); }
        .grid-slot.drop-target { border-color: var(--accent-green); border-style: solid; background: rgba(74, 222, 128, 0.1); transform: scale(1.05); }
        .grid-slot.has-creature { border-style: solid; border-color: var(--border-subtle); }
        .grid-slot.selected { border-color: var(--accent-cyan); border-style: solid; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        
        /* Creature Card */
        .creature-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            cursor: grab;
            transition: transform 0.2s;
            position: relative;
        }
        
        .creature-card:hover { transform: scale(1.1); }
        .creature-card.dragging { opacity: 0.5; cursor: grabbing; }
        
        .creature-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px currentColor);
            transition: all 0.3s;
        }
        
        .creature-card:hover .creature-icon { transform: scale(1.2) rotate(5deg); }
        
        .creature-name {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 4px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 4px;
        }
        
        .creature-rarity {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .rarity-common { background: #6b7280; color: white; }
        .rarity-uncommon { background: var(--accent-green); color: black; }
        .rarity-rare { background: var(--accent-cyan); color: black; }
        .rarity-epic { background: var(--accent-purple); color: white; }
        .rarity-legendary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink)); color: black; }
        .rarity-mythical { background: linear-gradient(135deg, #ff6b6b, #feca57); color: black; }
        
        /* Combine Button */
        #combine-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 48px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            border: none;
            border-radius: 50px;
            color: #0a0a0f;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            z-index: 10;
        }
        
        #combine-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 50px rgba(251, 191, 36, 0.5); }
        #combine-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: translateX(-50%); box-shadow: none; }
        
        .combine-hint {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            z-index: 10;
        }
        
        /* Sidebar */
        #sidebar {
            background: var(--bg-panel);
            border-left: 1px solid var(--border-subtle);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .panel {
            background: var(--bg-elevated);
            border-radius: 16px;
            padding: 20px;
        }
        
        .panel h2 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Discovery List */
        #discovery-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .discovery-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-panel);
            border-radius: 10px;
            opacity: 0.4;
            transition: all 0.3s;
        }
        
        .discovery-item.discovered { opacity: 1; }
        .discovery-item .icon { font-size: 1.5rem; }
        .discovery-item .info { flex: 1; }
        .discovery-item .name { font-size: 0.9rem; font-weight: 600; }
        .discovery-item .fact { font-size: 0.7rem; color: var(--text-muted); line-height: 1.3; }
        
        /* Recipes Panel */
        #recipes-panel { flex: 1; }
        
        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .recipe-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-panel);
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .recipe-item .ingredients { display: flex; align-items: center; gap: 4px; flex: 1; }
        .recipe-item .ingredients span { font-size: 1.2rem; }
        .recipe-item .arrow { color: var(--accent-gold); font-size: 1.2rem; }
        .recipe-item .result { font-size: 1.2rem; }
        .recipe-item.locked { opacity: 0.3; }
        .recipe-item.discovered-recipe { border: 1px solid var(--accent-green); }
        
        /* Spawner */
        #spawner-panel {
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-panel));
            border: 1px solid var(--border-glow);
        }
        
        .spawner-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .spawner-slot {
            aspect-ratio: 1;
            background: var(--bg-slot);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .spawner-slot:hover {
            border-color: var(--accent-gold);
            transform: scale(1.1);
            background: rgba(251, 191, 36, 0.1);
        }
        
        .spawner-slot:active { transform: scale(0.95); }
        
        /* Modal */
        #discovery-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        #discovery-modal.show { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: var(--bg-panel);
            border: 2px solid var(--accent-gold);
            border-radius: 24px;
            padding: 40px 60px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
        }
        
        #discovery-modal.show .modal-content { transform: scale(1); }
        
        .modal-content h2 { font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 8px; }
        .modal-content .new-text { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; }
        .modal-content .creature-reveal { font-size: 5rem; margin-bottom: 16px; animation: bounce 0.6s ease-out; }
        
        @keyframes bounce { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .modal-content .creature-name { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .modal-content .creature-fact { font-size: 0.95rem; color: var(--text-secondary); max-width: 350px; line-height: 1.5; margin-bottom: 24px; }
        .modal-content .creature-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
        .modal-content .stat { text-align: center; }
        .modal-content .stat-value { font-family: 'Space Mono', monospace; font-size: 1.2rem; color: var(--accent-cyan); }
        .modal-content .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        
        .easter-egg-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
            animation: glow 1.5s infinite;
        }
        
        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(192, 132, 252, 0.5); } 50% { box-shadow: 0 0 25px rgba(192, 132, 252, 0.8); } }
        
        .close-modal {
            padding: 12px 32px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .close-modal:hover { background: var(--accent-gold); color: var(--bg-dark); }
        
        #instructions { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
        #instructions span { color: var(--accent-cyan); font-weight: 600; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 500;
        }
        
        .toast {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-icon { font-size: 1.3rem; }
        .toast-message { font-size: 0.9rem; color: var(--text-primary); }
        
        .reset-btn {
            background: var(--accent-red);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .reset-btn:hover { background: #ef4444; }
    </style>
</head>
<body>
    <div id="game-container">
        <header>
            <div class="logo">
                <div class="logo-icon">🧬</div>
                <h1>Animal Evolution Combiner</h1>
            </div>
            <div class="progress-display">
                <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
                <div class="discovered-count">
                    <span id="discovered-num">3</span>/<span id="total-creatures">45</span> Discovered
                </div>
            </div>
        </header>
        
        <div id="play-area">
            <div id="combiner-grid"></div>
            <div class="combine-hint" id="combine-hint">Select two creatures to combine</div>
            <button id="combine-btn" disabled>Combine!</button>
        </div>
        
        <div id="sidebar">
            <div class="panel" id="spawner-panel">
                <h2>🧫 Spawner</h2>
                <div class="spawner-grid" id="spawner-grid"></div>
            </div>
            
            <div class="panel" id="recipes-panel">
                <h2>📜 Evolution Recipes</h2>
                <div class="recipe-list" id="recipe-list"></div>
            </div>
            
            <div class="panel">
                <h2>🔬 Discovery Log</h2>
                <div id="discovery-list"></div>
            </div>
            
            <div id="instructions">
                <span>Click</span> creatures to select • <span>Drag</span> to move • <span>Combine</span> to evolve!
            </div>
        </div>
    </div>
    
    <!-- Discovery Modal -->
    <div id="discovery-modal">
        <div class="modal-content">
            <h2 id="modal-title">✨ New Discovery!</h2>
            <div id="modal-easter-egg" class="easter-egg-badge" style="display:none;">🐰 EASTER EGG!</div>
            <div class="creature-reveal" id="modal-icon"></div>
            <div class="creature-name" id="modal-name"></div>
            <div class="creature-fact" id="modal-fact"></div>
            <div class="creature-stats">
                <div class="stat">
                    <div class="stat-value" id="modal-era">-</div>
                    <div class="stat-label">Era</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="modal-rarity">-</div>
                    <div class="stat-label">Rarity</div>
                </div>
            </div>
            <button class="close-modal" onclick="closeModal()">Amazing!</button>
        </div>
    </div>
    
    <div id="toast-container"></div>

    <script>
        // ==================== CREATURE DATABASE ====================
        const creatures = {
            // PRIMITIVE ERA
            'trilobite': { name: 'Trilobite', icon: '🦐', era: 'Cambrian', rarity: 'common', fact: 'One of the earliest known arthropods, thriving for over 270 million years!', isEasterEgg: false, spawnable: true },
            'anomalocaris': { name: 'Anomalocaris', icon: '🦑', era: 'Cambrian', rarity: 'uncommon', fact: 'The "odd shrimp" was the apex predator with eyes the size of ping pong balls!', isEasterEgg: false, spawnable: true },
            'hallucigenia': { name: 'Hallucigenia', icon: '🐛', era: 'Cambrian', rarity: 'rare', fact: 'Scientists originally thought it walked on its spines!', isEasterEgg: false, spawnable: false },
            
            // PALEOZOIC
            'meganeura': { name: 'Meganeura', icon: '🪰', era: 'Carboniferous', rarity: 'rare', fact: 'A dragonfly with a 28-inch wingspan - one of the largest flying insects ever!', isEasterEgg: false, spawnable: true },
            'dimetrodon': { name: 'Dimetrodon', icon: '🦎', era: 'Permian', rarity: 'uncommon', fact: 'Not a dinosaur! More closely related to mammals with its sail back.', isEasterEgg: false, spawnable: true },
            'earless-dragon': { name: 'Ear Dragon', icon: '🐲', era: 'Permian', rarity: 'epic', fact: '🔥 EASTER EGG! Can hear frequencies that don\'t even exist yet!', isEasterEgg: true, spawnable: false },
            
            // MESOZOIC
            'coelophysis': { name: 'Coelophysis', icon: '🦖', era: 'Triassic', rarity: 'uncommon', fact: 'Small, fast, lightweight - could run up to 30 mph!', isEasterEgg: false, spawnable: true },
            'velociraptor': { name: 'Velociraptor', icon: '🦖', era: 'Cretaceous', rarity: 'rare', fact: 'Only turkey-sized and covered in feathers!', isEasterEgg: false, spawnable: false },
            'triceratops': { name: 'Triceratops', icon: '🦕', era: 'Cretaceous', rarity: 'rare', fact: 'Three-horned face that lived alongside T. rex!', isEasterEgg: false, spawnable: true },
            'tyrannosaurus': { name: 'Tyrannosaurus', icon: '👑', era: 'Cretaceous', rarity: 'epic', fact: 'The "tyrant lizard king" had the strongest bite of any land animal!', isEasterEgg: false, spawnable: false },
            'pteranodon': { name: 'Pteranodon', icon: '🦅', era: 'Cretaceous', rarity: 'rare', fact: 'Not a dinosaur! A pterosaur with 20-foot wingspan!', isEasterEgg: false, spawnable: true },
            'chicken-raptor': { name: 'Chickenosaurus', icon: '🐔', era: 'Cretaceous', rarity: 'legendary', fact: '🔥 EASTER EGG! A prehistoric chicken with a dinosaur soul!', isEasterEgg: true, spawnable: false },
            
            // CENOZOIC
            'megatherium': { name: 'Megatherium', icon: '🦥', era: 'Pleistocene', rarity: 'uncommon', fact: 'A giant ground sloth the size of an elephant!', isEasterEgg: false, spawnable: true },
            'sabertooth': { name: 'Saber-toothed Cat', icon: '🐯', era: 'Pleistocene', rarity: 'rare', fact: '7-inch fangs that could open 120 degrees!', isEasterEgg: false, spawnable: true },
            'mammoth': { name: 'Woolly Mammoth', icon: '🐘', era: 'Pleistocene', rarity: 'rare', fact: 'We painted them on cave walls!', isEasterEgg: false, spawnable: true },
            'smilodon': { name: 'Smilodon', icon: '🦁', era: 'Pleistocene', rarity: 'rare', fact: '🔥 EASTER EGG! The "knife-tooth" with 3x lion\'s bite force!', isEasterEgg: true, spawnable: false },
            
            // MODERN
            'platypus': { name: 'Platypus', icon: '🦆', era: 'Present', rarity: 'uncommon', fact: 'One of only 5 egg-laying mammals with 10 sex chromosomes!', isEasterEgg: false, spawnable: true },
            'kangaroo': { name: 'Kangaroo', icon: '🦘', era: 'Present', rarity: 'common', fact: 'Can jump 10 feet high and reach 40 mph!', isEasterEgg: false, spawnable: true },

            'tardigrade': { name: 'Tardigrade', icon: '🐻', era: 'Present', rarity: 'epic', fact: 'Can survive in space, radiation, and deep ocean pressure!', isEasterEgg: false, spawnable: false },
            'blobfish': { name: 'Blobfish', icon: '🐟', era: 'Present', rarity: 'rare', fact: '🔥 EASTER EGG! Looks sad at surface but normal underwater!', isEasterEgg: true, spawnable: false },
            
            // EASTER EGGS
            'cryo-dragon': { name: 'Cryo Dragon', icon: '🐉', era: 'Future', rarity: 'legendary', fact: '🔥 EASTER EGG! Awakened from eternal ice!', isEasterEgg: true, spawnable: false },
            'quantum-cat': { name: 'Quantum Cat', icon: '🐱', era: 'Future', rarity: 'mythical', fact: '🔥 EASTER EGG! Exists in multiple states until observed!', isEasterEgg: true, spawnable: false },
            'galactic-whale': { name: 'Galactic Whale', icon: '🐋', era: 'Future', rarity: 'mythical', fact: '🔥 EASTER EGG! Swims through the cosmic void!', isEasterEgg: true, spawnable: false },
            'time-phoenix': { name: 'Time Phoenix', icon: '🔥', era: 'Mythical', rarity: 'mythical', fact: '🔥 EASTER EGG! Can travel to any point in history!', isEasterEgg: true, spawnable: false },
            'void-squid': { name: 'Void Squid', icon: '🦑', era: 'Cosmic', rarity: 'mythical', fact: '🔥 EASTER EGG! From the space between dimensions!', isEasterEgg: true, spawnable: false },
            
            // MORE REAL ANIMALS
            'coelacanth': { name: 'Coelacanth', icon: '🐠', era: 'Present', rarity: 'rare', fact: 'A "living fossil" thought extinct until rediscovered in 1938!', isEasterEgg: false, spawnable: true },
            'nautilus': { name: 'Nautilus', icon: '🐚', era: 'Present', rarity: 'rare', fact: 'Has survived 500 million years!', isEasterEgg: false, spawnable: true },
            'horseshoe-crab': { name: 'Horseshoe Crab', icon: '🦀', era: 'Present', rarity: 'uncommon', fact: 'Blue blood used to test medical equipment!', isEasterEgg: false, spawnable: true },
            'cockroach': { name: 'Cockroach', icon: '🪳', era: 'Present', rarity: 'common', fact: 'Can survive weeks without a head and handle radiation!', isEasterEgg: false, spawnable: true },
            'sturgeon': { name: 'Sturgeon', icon: '🐡', era: 'Present', rarity: 'uncommon', fact: 'Existed 200 million years and lives 100+ years!', isEasterEgg: false, spawnable: true },
            'lungfish': { name: 'Lungfish', icon: '🐟', era: 'Present', rarity: 'rare', fact: 'Can breathe air and survive in dried mud for 4 years!', isEasterEgg: false, spawnable: true },
            'elephant': { name: 'Elephant', icon: '🐘', era: 'Present', rarity: 'uncommon', fact: 'The only animal that can\'t jump but recognizes itself in mirrors!', isEasterEgg: false, spawnable: true },
            'dolphin': { name: 'Dolphin', icon: '🐬', era: 'Present', rarity: 'uncommon', fact: 'Each has a unique whistle like a name!', isEasterEgg: false, spawnable: true },
            'octopus': { name: 'Octopus', icon: '🐙', era: 'Present', rarity: 'rare', fact: 'Has 3 hearts, 9 brains, changes color in 0.2 seconds!', isEasterEgg: false, spawnable: true },
            'human': { name: 'Human', icon: '🧍', era: 'Present', rarity: 'legendary', fact: 'The only species that can harness fire and build computers!', isEasterEgg: false, spawnable: false },
            
            // SECRET CREATURES
            'space-whale': { name: 'Space Whale', icon: '🚀', era: 'Cosmic', rarity: 'mythical', fact: '🔥 EASTER EGG! A whale evolved to breathe in space!', isEasterEgg: true, spawnable: false },
            'rainbow-raptor': { name: 'Rainbow Raptor', icon: '🌈', era: 'Mythical', rarity: 'mythical', fact: '🔥 EASTER EGG! Leaves trails of rainbows!', isEasterEgg: true, spawnable: false },
            'infinity-butterfly': { name: 'Infinity Butterfly', icon: '🦋', era: 'Eternal', rarity: 'mythical', fact: '🔥 EASTER EGG! Wings contain infinite universes!', isEasterEgg: true, spawnable: false }
        };

        // ==================== EVOLUTION RECIPES ====================
        const recipes = [
            { inputs: ['trilobite', 'trilobite'], result: 'anomalocaris' },
            { inputs: ['trilobite', 'anomalocaris'], result: 'hallucigenia' },
            { inputs: ['trilobite', 'hallucigenia'], result: 'meganeura' },
            { inputs: ['anomalocaris', 'hallucigenia'], result: 'dimetrodon' },
            { inputs: ['meganeura', 'dimetrodon'], result: 'earless-dragon' },
            { inputs: ['dimetrodon', 'dimetrodon'], result: 'coelophysis' },
            { inputs: ['coelophysis', 'meganeura'], result: 'pteranodon' },
            { inputs: ['coelophysis', 'coelophysis'], result: 'velociraptor' },
            { inputs: ['velociraptor', 'velociraptor'], result: 'tyrannosaurus' },
            { inputs: ['velociraptor', 'triceratops'], result: 'chicken-raptor' },
            { inputs: ['pteranodon', 'triceratops'], result: 'velociraptor' },
            { inputs: ['tyrannosaurus', 'pteranodon'], result: 'triceratops' },
            { inputs: ['dimetrodon', 'mammoth'], result: 'megatherium' },
            { inputs: ['triceratops', 'sabertooth'], result: 'sabertooth' },
            { inputs: ['mammoth', 'sabertooth'], result: 'smilodon' },
            { inputs: ['megatherium', 'mammoth'], result: 'sturgeon' },
            { inputs: ['platypus', 'platypus'], result: 'kangaroo' },
            { inputs: ['kangaroo', 'komodo'], result: 'axolotl' },
            { inputs: ['axolotl', 'cockroach'], result: 'tardigrade' },
            { inputs: ['tardigrade', 'blobfish'], result: 'blobfish' },
            { inputs: ['platypus', 'human'], result: 'human' },
            { inputs: ['coelacanth', 'coelacanth'], result: 'nautilus' },
            { inputs: ['nautilus', 'horseshoe-crab'], result: 'lungfish' },
            { inputs: ['lungfish', 'cockroach'], result: 'sturgeon' },
            { inputs: ['elephant', 'dolphin'], result: 'octopus' },
            { inputs: ['chicken-raptor', 'earless-dragon'], result: 'cryo-dragon' },
            { inputs: ['tardigrade', 'quantum-cat'], result: 'quantum-cat' },
            { inputs: ['dolphin', 'elephant'], result: 'human' },
            { inputs: ['tyrannosaurus', 'human'], result: 'galactic-whale' },
            { inputs: ['tardigrade', 'cryo-dragon'], result: 'time-phoenix' },
            { inputs: ['octopus', 'quantum-cat'], result: 'void-squid' },
            { inputs: ['galactic-whale', 'time-phoenix'], result: 'space-whale' },
            { inputs: ['chicken-raptor', 'blobfish'], result: 'rainbow-raptor' },
            { inputs: ['void-squid', 'infinity-butterfly'], result: 'infinity-butterfly' },
            { inputs: ['human', 'tardigrade'], result: 'infinity-butterfly' }
        ];

        // ==================== LOCALSTORAGE ====================
        const STORAGE_KEY = 'animalEvolutionSave';

        function saveGame() {
            const saveData = {
                gridState: gridState,
                discoveredCreatures: Array.from(discoveredCreatures)
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                gridState = data.gridState || Array(36).fill(null);
                discoveredCreatures = new Set(data.discoveredCreatures || ['trilobite', 'anomalocaris', 'coelophysis']);
            } else {
                // Default start
                gridState = Array(36).fill(null);
                discoveredCreatures = new Set(['trilobite', 'anomalocaris', 'coelophysis']);
                spawnCreature('trilobite', 0);
                spawnCreature('trilobite', 1);
                spawnCreature('anomalocaris', 6);
            }
        }

        function resetGame() {
            if (confirm('Reset all progress?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // ==================== GAME STATE ====================
        let selectedSlots = [];

        // ==================== INITIALIZATION ====================
        function init() {
            loadGame();
            createGrid();
            createSpawner();
            updateDiscoveryList();
            updateRecipeList();
            updateProgress();
        }

        function createGrid() {
            const grid = document.getElementById('combiner-grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 36; i++) {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                slot.dataset.index = i;
                slot.onclick = () => selectSlot(i);
                slot.ondragover = (e) => { e.preventDefault(); slot.classList.add('drop-target'); };
                slot.ondragleave = () => slot.classList.remove('drop-target');
                slot.ondrop = (e) => handleDrop(e, i);
                grid.appendChild(slot);
            }
            
            renderGrid();
        }

        function createSpawner() {
            const spawnerGrid = document.getElementById('spawner-grid');
            spawnerGrid.innerHTML = '';
            
            const spawnable = Object.entries(creatures).filter(([id, c]) => c.spawnable);
            spawnable.forEach(([id, creature]) => {
                const slot = document.createElement('div');
                slot.className = 'spawner-slot';
                slot.textContent = creature.icon;
                slot.title = creature.name;
                slot.onclick = () => spawnInGrid(id);
                spawnerGrid.appendChild(slot);
            });
        }

        function spawnInGrid(creatureId) {
            const emptyIndex = gridState.findIndex(s => s === null);
            if (emptyIndex !== -1) {
                gridState[emptyIndex] = creatureId;
                saveGame();
                renderGrid();
                showToast(`Spawned ${creatures[creatureId].name}!`, creatures[creatureId].icon);
            } else {
                showToast('Grid is full! Combine some creatures.', '⚠️');
            }
        }

        function spawnCreature(creatureId, index) {
            if (index >= 0 && index < 36) {
                gridState[index] = creatureId;
            }
        }

        // ==================== RENDERING ====================
        function renderGrid() {
            const slots = document.querySelectorAll('.grid-slot');
            slots.forEach((slot, i) => {
                slot.innerHTML = '';
                slot.classList.remove('has-creature', 'selected');
                
                if (gridState[i]) {
                    const creature = creatures[gridState[i]];
                    const card = document.createElement('div');
                    card.className = 'creature-card';
                    card.draggable = true;
                    card.innerHTML = `
                        <span class="creature-icon">${creature.icon}</span>
                        <span class="creature-name">${creature.name}</span>
                        <span class="creature-rarity rarity-${creature.rarity}">${creature.rarity}</span>
                    `;
                    
                    card.ondragstart = (e) => { card.classList.add('dragging'); e.dataTransfer.setData('text/plain', i); };
                    card.ondragend = () => card.classList.remove('dragging');
                    
                    slot.appendChild(card);
                    slot.classList.add('has-creature');
                }
                
                if (selectedSlots.includes(i)) {
                    slot.classList.add('selected');
                }
            });
            
            updateCombineButton();
        }

        function updateDiscoveryList() {
            const list = document.getElementById('discovery-list');
            list.innerHTML = '';
            
            Object.entries(creatures).forEach(([id, creature]) => {
                const item = document.createElement('div');
                item.className = `discovery-item ${discoveredCreatures.has(id) ? 'discovered' : ''}`;
                item.innerHTML = `
                    <span class="icon">${discoveredCreatures.has(id) ? creature.icon : '❓'}</span>
                    <div class="info">
                        <div class="name">${discoveredCreatures.has(id) ? creature.name : '???'}</div>
                        <div class="fact">${discoveredCreatures.has(id) ? creature.fact.substring(0, 50) + '...' : 'Discover to reveal!'}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function updateRecipeList() {
            const list = document.getElementById('recipe-list');
            list.innerHTML = '';
            
            recipes.forEach((recipe) => {
                const input1 = creatures[recipe.inputs[0]];
                const input2 = creatures[recipe.inputs[1]];
                const result = creatures[recipe.result];
                
                const item = document.createElement('div');
                item.className = 'recipe-item';
                
                const canDiscover = discoveredCreatures.has(recipe.inputs[0]) && discoveredCreatures.has(recipe.inputs[1]);
                if (canDiscover) item.classList.add('discovered-recipe');
                
                item.innerHTML = `
                    <div class="ingredients">
                        <span>${input1.icon}</span>
                        <span>+</span>
                        <span>${input2.icon}</span>
                    </div>
                    <span class="arrow">→</span>
                    <span class="result">${canDiscover ? result.icon : '❓'}</span>
                `;
                
                list.appendChild(item);
            });
        }

        function updateProgress() {
            const totalCreatures = Object.keys(creatures).length;
            document.getElementById('discovered-num').textContent = discoveredCreatures.size;
            document.getElementById('total-creatures').textContent = totalCreatures;
        }

        // ==================== INTERACTION ====================
        function selectSlot(index) {
            if (!gridState[index]) return;
            
            const slotIndex = selectedSlots.indexOf(index);
            
            if (slotIndex > -1) {
                selectedSlots.splice(slotIndex, 1);
            } else {
                if (selectedSlots.length < 2) {
                    selectedSlots.push(index);
                } else {
                    selectedSlots = [index];
                }
            }
            
            renderGrid();
        }

        function handleDrop(e, targetIndex) {
            e.preventDefault();
            document.querySelectorAll('.drop-target').forEach(s => s.classList.remove('drop-target'));
            
            const sourceIndex = parseInt(e.dataTransfer.getData('text/plain'));
            
            if (sourceIndex !== targetIndex) {
                const temp = gridState[targetIndex];
                gridState[targetIndex] = gridState[sourceIndex];
                gridState[sourceIndex] = temp;
                saveGame();
                renderGrid();
            }
        }

        function updateCombineButton() {
            const btn = document.getElementById('combine-btn');
            const hint = document.getElementById('combine-hint');
            
            if (selectedSlots.length === 2) {
                btn.disabled = false;
                hint.textContent = 'Ready to combine!';
            } else {
                btn.disabled = true;
                hint.textContent = selectedSlots.length === 1 ? 'Select one more creature' : 'Select two creatures to combine';
            }
        }

        // ==================== COMBINING ====================
        document.getElementById('combine-btn').onclick = combine;

        function combine() {
            if (selectedSlots.length !== 2) return;
            
            const [idx1, idx2] = selectedSlots;
            const creature1 = gridState[idx1];
            const creature2 = gridState[idx2];
            
            const recipe = recipes.find(r => 
                (r.inputs[0] === creature1 && r.inputs[1] === creature2) ||
                (r.inputs[0] === creature2 && r.inputs[1] === creature1)
            );
            
            if (recipe) {
                const resultCreature = creatures[recipe.result];
                
                gridState[idx1] = recipe.result;
                gridState[idx2] = null;
                selectedSlots = [];
                
                if (!discoveredCreatures.has(recipe.result)) {
                    discoveredCreatures.add(recipe.result);
                    saveGame();
                    showDiscoveryModal(recipe.result);
                } else {
                    saveGame();
                    showToast(`Created ${resultCreature.name}!`, resultCreature.icon);
                }
                
                renderGrid();
                updateDiscoveryList();
                updateRecipeList();
                updateProgress();
            } else {
                showToast('These creatures cannot combine!', '❌');
                selectedSlots = [];
                renderGrid();
            }
        }

        // ==================== MODAL ====================
        function showDiscoveryModal(creatureId) {
            const creature = creatures[creatureId];
            const modal = document.getElementById('discovery-modal');
            
            document.getElementById('modal-title').textContent = creature.isEasterEgg ? '🎉 EASTER EGG FOUND!' : '✨ New Discovery!';
            document.getElementById('modal-easter-egg').style.display = creature.isEasterEgg ? 'inline-block' : 'none';
            document.getElementById('modal-icon').textContent = creature.icon;
            document.getElementById('modal-name').textContent = creature.name;
            document.getElementById('modal-fact').textContent = creature.fact;
            document.getElementById('modal-era').textContent = creature.era;
            document.getElementById('modal-rarity').textContent = creature.rarity.toUpperCase();
            
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('discovery-modal').classList.remove('show');
        }

        document.getElementById('discovery-modal').onclick = (e) => {
            if (e.target.id === 'discovery-modal') closeModal();
        };

        // ==================== TOAST ====================
        function showToast(message, icon) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-message">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // Start the game
        init();
    </script>
</body>
