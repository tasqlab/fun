<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Simulator - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
        }

        #ui-overlay h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        #info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            padding: 15px 20px;
            color: white;
            font-size: 13px;
            backdrop-filter: blur(10px);
        }

        #info-panel h3 {
            color: #64c8ff;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #info-panel p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: white;
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        #controls h3 {
            color: #64c8ff;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .key {
            background: rgba(100, 200, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        #planet-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .planet-btn {
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .planet-btn:hover {
            transform: scale(1.1);
            border-color: #64c8ff;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .planet-btn.active {
            border-color: #64c8ff;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.8);
        }

        .planet-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #time-display {
            position: fixed;
            top: 80px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0, 20, 40, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-overlay">
        <h1>PLANET SIMULATOR</h1>
    </div>
    
    <div id="time-display">
        <span id="time-label">Simulation Speed: 1x</span>
    </div>

    <div id="planet-selector">
        <button class="planet-btn active" onclick="selectPlanet('earth')" title="Earth">
            <canvas id="btn-earth" width="50" height="50"></canvas>
        </button>
        <button class="planet-btn" onclick="selectPlanet('mars')" title="Mars">
            <canvas id="btn-mars" width="50" height="50"></canvas>
        </button>
        <button class="planet-btn" onclick="selectPlanet('jupiter')" title="Jupiter">
            <canvas id="btn-jupiter" width="50" height="50"></canvas>
        </button>
        <button class="planet-btn" onclick="selectPlanet('venus')" title="Venus">
            <canvas id="btn-venus" width="50" height="50"></canvas>
        </button>
    </div>

    <div id="info-panel">
        <h3>Earth</h3>
        <p>
            Diameter: 12,742 km<br>
            Distance from Sun: 149.6M km<br>
            Day length: 24 hours<br>
            Year: 365.25 days<br>
            Moons: 1
        </p>
    </div>

    <div id="controls">
        <h3>Controls</h3>
        <div class="control-row"><span>Rotate</span><span class="key">Mouse Drag</span></div>
        <div class="control-row"><span>Zoom</span><span class="key">Scroll</span></div>
        <div class="control-row"><span>Speed +</span><span class="key">↑ Arrow</span></div>
        <div class="control-row"><span>Speed -</span><span class="key">↓ Arrow</span></div>
        <div class="control-row"><span>Toggle Atmosphere</span><span class="key">A</span></div>
        <div class="control-row"><span>Toggle Clouds</span><span class="key">C</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Planet data
        const planetData = {
            earth: {
                name: 'Earth',
                diameter: '12,742 km',
                distance: '149.6M km',
                dayLength: '24 hours',
                year: '365.25 days',
                moons: '1',
                radius: 5,
                color: 0x1a4d8c,
                atmosphereColor: 0x88ccff,
                rotationSpeed: 0.001
            },
            mars: {
                name: 'Mars',
                diameter: '6,779 km',
                distance: '227.9M km',
                dayLength: '24.6 hours',
                year: '687 days',
                moons: '2',
                radius: 2.7,
                color: 0xc1440e,
                atmosphereColor: 0xff6644,
                rotationSpeed: 0.0009
            },
            jupiter: {
                name: 'Jupiter',
                diameter: '139,820 km',
                distance: '778.5M km',
                dayLength: '9.9 hours',
                year: '11.86 years',
                moons: '95',
                radius: 11,
                color: 0xd4a574,
                atmosphereColor: 0xffd4a0,
                rotationSpeed: 0.002
            },
            venus: {
                name: 'Venus',
                diameter: '12,104 km',
                distance: '108.2M km',
                dayLength: '243 days',
                year: '225 days',
                moons: '0',
                radius: 4.8,
                color: 0xe6c87a,
                atmosphereColor: 0xffe4b3,
                rotationSpeed: -0.0003
            }
        };

        // Scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Camera position
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        // Controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationSpeed = 1;
        let showAtmosphere = true;
        let showClouds = true;
        let currentPlanet = 'earth';

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            if (earthGroup) {
                earthGroup.rotation.y += deltaX * 0.005;
                earthGroup.rotation.x += deltaY * 0.005;
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        container.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mouseleave', () => isDragging = false);

        container.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(10, Math.min(50, camera.position.z));
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') rotationSpeed = Math.min(10, rotationSpeed + 1);
            if (e.key === 'ArrowDown') rotationSpeed = Math.max(0, rotationSpeed - 1);
            if (e.key === 'a' || e.key === 'A') {
                showAtmosphere = !showAtmosphere;
                if (atmosphereMesh) atmosphereMesh.visible = showAtmosphere;
            }
            if (e.key === 'c' || e.key === 'C') {
                showClouds = !showClouds;
                if (cloudsMesh) cloudsMesh.visible = showClouds;
            }
            document.getElementById('time-label').textContent = `Simulation Speed: ${rotationSpeed}x`;
        });

        // Create starfield
        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const colors = [];
            
            for (let i = 0; i < 15000; i++) {
                const r = 200 + Math.random() * 300;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                vertices.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
                
                const brightness = 0.5 + Math.random() * 0.5;
                const tint = Math.random();
                colors.push(
                    brightness * (tint > 0.8 ? 1 : 0.9),
                    brightness * (tint > 0.9 ? 0.8 : 0.95),
                    brightness
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });
            
            return new THREE.Points(geometry, material);
        }

        const starfield = createStarfield();
        scene.add(starfield);

        // Create sun
        const sunGeometry = new THREE.SphereGeometry(3, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: 0xffdd44,
            transparent: true,
            opacity: 1
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.position.set(-50, 10, -30);
        scene.add(sun);

        // Sun glow
        const sunGlowGeometry = new THREE.SphereGeometry(4, 32, 32);
        const sunGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffaa00,
            transparent: true,
            opacity: 0.3
        });
        const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
        sunGlow.position.copy(sun.position);
        scene.add(sunGlow);

        // Sunlight
        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(-50, 10, -30);
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
        scene.add(ambientLight);

        // Planet group
        let earthGroup;
        let earthMesh, atmosphereMesh, cloudsMesh, moonGroup;

        // Create planet texture procedurally
        function createEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Ocean base
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a3d5c');
            gradient.addColorStop(0.3, '#1a4d7c');
            gradient.addColorStop(0.5, '#1a5d8c');
            gradient.addColorStop(0.7, '#1a4d7c');
            gradient.addColorStop(1, '#1a3d5c');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Continents (simplified shapes)
            ctx.fillStyle = '#2d5a2d';
            
            // North America
            ctx.beginPath();
            ctx.ellipse(400, 250, 150, 100, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // South America
            ctx.beginPath();
            ctx.ellipse(550, 550, 60, 120, 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Europe/Africa
            ctx.beginPath();
            ctx.ellipse(1050, 400, 80, 150, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Asia
            ctx.beginPath();
            ctx.ellipse(1400, 300, 200, 120, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Australia
            ctx.beginPath();
            ctx.ellipse(1650, 600, 80, 60, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ice caps
            ctx.fillStyle = '#e8f0f8';
            ctx.fillRect(0, 0, canvas.width, 40);
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            
            // Add some noise/texture
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 3 + 1;
                const alpha = Math.random() * 0.3;
                ctx.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 0}, ${Math.random() > 0.5 ? 255 : 0}, ${Math.random() > 0.5 ? 255 : 0}, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function createCloudTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radiusX = Math.random() * 100 + 50;
                const radiusY = Math.random() * 50 + 25;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radiusX);
                gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function createMarsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#8b3a1d');
            gradient.addColorStop(0.3, '#a04520');
            gradient.addColorStop(0.5, '#c1440e');
            gradient.addColorStop(0.7, '#a04520');
            gradient.addColorStop(1, '#8b3a1d');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Craters
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = Math.random() * 30 + 5;
                ctx.fillStyle = 'rgba(100, 40, 20, 0.5)';
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function createJupiterTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Bands
            const colors = ['#c9a86c', '#d4b080', '#e8cda0', '#c9a86c', '#b89060', '#d4b080', '#c9a86c', '#a07850'];
            const bandHeight = canvas.height / colors.length;
            
            colors.forEach((color, i) => {
                ctx.fillStyle = color;
                ctx.fillRect(0, i * bandHeight, canvas.width, bandHeight);
            });
            
            // Storms
            const storms = [
                { x: 300, y: 150, r: 40 },
                { x: 800, y: 300, r: 30 },
                { x: 1500, y: 250, r: 25 }
            ];
            
            storms.forEach(storm => {
                const gradient = ctx.createRadialGradient(storm.x, storm.y, 0, storm.x, storm.y, storm.r);
                gradient.addColorStop(0, '#ff8866');
                gradient.addColorStop(1, 'rgba(255,136,102,0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(storm.x, storm.y, storm.r, 0, Math.PI * 2);
                ctx.fill();
            });
            
            return new THREE.CanvasTexture(canvas);
        }

        function createVenusTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#e6c87a');
            gradient.addColorStop(0.5, '#f0d890');
            gradient.addColorStop(1, '#e6c87a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Cloud swirls
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = Math.random() * 80 + 20;
                
                const gradient2 = ctx.createRadialGradient(x, y, 0, x, y, r);
                gradient2.addColorStop(0, 'rgba(255,255,255,0.3)');
                gradient2.addColorStop(1, 'rgba(255,255,255,0)');
                
                ctx.fillStyle = gradient2;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        // Create atmosphere shader
        const atmosphereVertexShader = `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const atmosphereFragmentShader = `
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
            }
        `;

        function createPlanet(planetName) {
            // Clear existing
            if (earthGroup) {
                scene.remove(earthGroup);
            }
            
            const data = planetData[planetName];
            earthGroup = new THREE.Group();
            
            // Planet mesh
            let texture;
            switch(planetName) {
                case 'earth': texture = createEarthTexture(); break;
                case 'mars': texture = createMarsTexture(); break;
                case 'jupiter': texture = createJupiterTexture(); break;
                case 'venus': texture = createVenusTexture(); break;
            }
            
            const geometry = new THREE.SphereGeometry(data.radius, 64, 64);
            const material = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.8,
                metalness: 0.1
            });
            
            earthMesh = new THREE.Mesh(geometry, material);
            earthGroup.add(earthMesh);
            
            // Atmosphere (Earth only)
            if (planetName === 'earth') {
                const atmosphereGeo = new THREE.SphereGeometry(data.radius + 0.3, 64, 64);
                const atmosphereMat = new THREE.ShaderMaterial({
                    vertexShader: atmosphereVertexShader,
                    fragmentShader: atmosphereFragmentShader,
                    transparent: true,
                    side: THREE.BackSide,
                    blending: THREE.AdditiveBlending
                });
                atmosphereMesh = new THREE.Mesh(atmosphereGeo, atmosphereMat);
                earthGroup.add(atmosphereMesh);
                
                // Clouds
                const cloudGeo = new THREE.SphereGeometry(data.radius + 0.15, 64, 64);
                const cloudMat = new THREE.MeshStandardMaterial({
                    map: createCloudTexture(),
                    transparent: true,
                    opacity: 0.4,
                    depthWrite: false
                });
                cloudsMesh = new THREE.Mesh(cloudGeo, cloudMat);
                earthGroup.add(cloudsMesh);
            }
            
            // Moon (Earth only)
            if (planetName === 'earth') {
                moonGroup = new THREE.Group();
                
                const moonGeo = new THREE.SphereGeometry(0.8, 32, 32);
                const moonMat = new THREE.MeshStandardMaterial({
                    color: 0xcccccc,
                    roughness: 1
                });
                const moon = new THREE.Mesh(moonGeo, moonMat);
                moon.position.set(8, 0, 0);
                moonGroup.add(moon);
                
                // Moon orbit
                moonGroup.rotation.x = 0.3;
                earthGroup.add(moonGroup);
            }
            
            scene.add(earthGroup);
            
            // Update UI
            const info = document.getElementById('info-panel');
            info.innerHTML = `
                <h3>${data.name}</h3>
                <p>
                    Diameter: ${data.diameter}<br>
                    Distance from Sun: ${data.distance}<br>
                    Day length: ${data.dayLength}<br>
                    Year: ${data.year}<br>
                    Moons: ${data.moons}
                </p>
            `;
        }

        // Planet buttons preview
        function createPlanetButtonPreview(canvasId, color, type) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            if (type === 'jupiter') {
                const colors = ['#c9a86c', '#d4b080', '#e8cda0', '#c9a86c'];
                const h = canvas.height / 4;
                colors.forEach((c, i) => {
                    ctx.fillStyle = c;
                    ctx.fillRect(0, i * h, canvas.width, h);
                });
            } else if (type === 'venus') {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#e6c87a');
                grad.addColorStop(0.5, '#f0d890');
                grad.addColorStop(1, '#e6c87a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(25, 25, 24, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Add planet name text
            ctx.fillStyle = 'white';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(type.charAt(0).toUpperCase() + type.slice(1), 25, 45);
        }

        createPlanetButtonPreview('btn-earth', '#1a5d8c', 'earth');
        createPlanetButtonPreview('btn-mars', '#c1440e', 'mars');
        createPlanetButtonPreview('btn-jupiter', null, 'jupiter');
        createPlanetButtonPreview('btn-venus', null, 'venus');

        // Select planet
        function selectPlanet(name) {
            currentPlanet = name;
            createPlanet(name);
            
            document.querySelectorAll('.planet-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.planet-btn').classList.add('active');
        }

        // Initialize
        createPlanet('earth');

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const data = planetData[currentPlanet];
            
            if (earthMesh && rotationSpeed > 0) {
                earthMesh.rotation.y += data.rotationSpeed * rotationSpeed;
            }
            
            if (cloudsMesh && showClouds) {
                cloudsMesh.rotation.y += 0.0005 * rotationSpeed;
            }
            
            if (moonGroup) {
                moonGroup.rotation.y += 0.005 * rotationSpeed;
            }
            
            // Sun pulsing
            sunGlow.scale.setScalar(1 + Math.sin(Date.now() * 0.001) * 0.1);
            
            // Starfield rotation
            starfield.rotation.y += 0.00005;
            
            renderer.render(scene, camera);
        }

        animate();

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
