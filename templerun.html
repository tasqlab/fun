<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a1714;
    --ink2: #4a4540;
    --ink3: #8a847a;
    --red: #c0392b;
    --green: #2d6a4f;
    --gold: #b8860b;
    --blue: #1a4a7a;
    --orange: #c05a10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: var(--bg);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
  }
  #game-wrapper {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: linear-gradient(180deg, #1a1714 0%, #2d2320 100%);
    display: flex;
    flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--bg);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    background: var(--ink);
  }
  .logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .header-stats {
    display: flex;
    gap: 20px;
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ink3);
  }
  .stat-item strong {
    color: var(--bg);
    font-weight: 600;
  }
  #game-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #game-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #menu-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(26,23,20,0.95);
    z-index: 50;
  }
  .menu-box {
    text-align: center;
    max-width: 380px;
    padding: 40px;
  }
  .menu-emoji {
    font-size: 80px;
    display: block;
    margin-bottom: 16px;
    animation: run 0.5s steps(2) infinite;
  }
  @keyframes run {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }
  .menu-title {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--gold), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .menu-subtitle {
    font-size: 14px;
    color: var(--ink3);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .menu-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 16px 48px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
    display: inline-block;
    margin: 8px;
  }
  .menu-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(184,134,11,0.4);
  }
  .high-score-display {
    font-family: 'Syne Mono', monospace;
    font-size: 14px;
    color: var(--gold);
    margin-top: 20px;
  }
  #game-over {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(26,23,20,0.95);
    z-index: 50;
  }
  .gameover-title {
    font-size: 42px;
    font-weight: 800;
    color: var(--red);
    margin-bottom: 16px;
  }
  .final-score {
    font-family: 'Syne Mono', monospace;
    font-size: 28px;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .new-record {
    font-size: 14px;
    color: var(--green);
    margin-bottom: 24px;
    animation: pulse 0.5s ease infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }
  #hud {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 24px;
    z-index: 20;
  }
  .hud-item {
    background: rgba(26,23,20,0.8);
    border: 2px solid var(--gold);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }
  .controls-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    display: none;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="game-wrapper">
    <header>
      <div class="logo">Temple Run</div>
      <div class="header-stats">
        <div class="stat-item"><span>DIST</span> <strong id="header-dist">0</strong>m</div>
        <div class="stat-item"><span>COINS</span> <strong id="header-coins">0</strong></div>
      </div>
    </header>
    
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      
      <div id="hud">
        <div class="hud-item">
          <span>🏃</span>
          <span id="hud-dist">0</span>m
        </div>
        <div class="hud-item">
          <span>💰</span>
          <span id="hud-coins">0</span>
        </div>
      </div>
      
      <div class="controls-hint" id="controls-hint">
        ← → MOVE &nbsp;&nbsp; ↑ JUMP &nbsp;&nbsp; ↓ SLIDE
      </div>
      
      <div id="menu-overlay">
        <div class="menu-box">
          <span class="menu-emoji">🏃</span>
          <h1 class="menu-title">TEMPLE RUN</h1>
          <p class="menu-subtitle">Run through the ancient temple!<br>Dodge obstacles, collect coins, survive!</p>
          <button class="menu-btn" id="play-btn">RUN!</button>
          <div class="high-score-display" id="high-score-display">BEST: 0m</div>
        </div>
      </div>
      
      <div id="game-over">
        <div class="menu-box">
          <span class="menu-emoji">😵</span>
          <h2 class="gameover-title">GAME OVER</h2>
          <p class="final-score" id="final-dist">0m</p>
          <p class="new-record hidden" id="new-record">🏆 NEW RECORD!</p>
          <p style="color:var(--ink3);margin-bottom:24px;font-size:14px;" id="final-coins">Coins: 0</p>
          <button class="menu-btn" id="retry-btn">RUN AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    // Game constants
    const LANE_WIDTH = 80;
    const LANES = [-1, 0, 1]; // left, center, right
    const GRAVITY = 0.8;
    const JUMP_FORCE = -14;
    
    // Colors
    const COLORS = {
      path: '#4a3f35',
      pathLight: '#5d4d40',
      wall: '#2d2320',
      wallLight: '#3d3330',
      pillar: '#8b7355',
      gold: '#b8860b',
      goldLight: '#d4a017',
      obstacle: '#c0392b',
      ground: '#3d3330'
    };
    
    // Game state
    let gameState = 'menu';
    let W, H;
    let distance = 0;
    let coins = 0;
    let highScore = parseInt(localStorage.getItem('templeRunHighScore')) || 0;
    let speed = 6;
    let speedIncrease = 0.001;
    
    // Player
    let player = {
      lane: 0, // -1, 0, 1
      x: 0,
      y: 0,
      vy: 0,
      width: 40,
      height: 60,
      isJumping: false,
      isSliding: false,
      slideTimer: 0,
      animFrame: 0
    };
    
    // Game objects
    let obstacles = [];
    let coinsArr = [];
    let pillars = [];
    let particles = [];
    let bgParticles = [];
    
    // DOM
    const menuOverlay = document.getElementById('menu-overlay');
    const gameOverEl = document.getElementById('game-over');
    const hud = document.getElementById('hud');
    const controlsHint = document.getElementById('controls-hint');
    
    // Show high score
    document.getElementById('high-score-display').textContent = 'BEST: ' + highScore + 'm';
    
    // Resize
    function resize() {
      const container = document.getElementById('game-container');
      W = canvas.width = container.clientWidth;
      H = canvas.height = container.clientHeight;
      player.x = W / 2;
      player.y = H - 120;
    }
    
    // Start game
    function startGame() {
      menuOverlay.style.display = 'none';
      hud.style.display = 'flex';
      controlsHint.style.display = 'block';
      
      gameState = 'playing';
      distance = 0;
      coins = 0;
      speed = 6;
      
      player.lane = 0;
      player.x = W / 2;
      player.y = H - 120;
      player.vy = 0;
      player.isJumping = false;
      player.isSliding = false;
      player.slideTimer = 0;
      
      obstacles = [];
      coinsArr = [];
      pillars = [];
      particles = [];
      
      // Pre-generate some pillars
      for (let i = 0; i < 10; i++) {
        pillars.push({
          x: W + i * 200,
          side: Math.random() > 0.5 ? -1 : 1
        });
      }
      
      updateHUD();
    }
    
    // Game over
    function gameOver() {
      gameState = 'gameover';
      hud.style.display = 'none';
      controlsHint.style.display = 'none';
      
      const isNewRecord = distance > highScore;
      if (isNewRecord) {
        highScore = distance;
        localStorage.setItem('templeRunHighScore', highScore);
      }
      
      document.getElementById('final-dist').textContent = Math.floor(distance) + 'm';
      document.getElementById('final-coins').textContent = 'Coins: ' + coins;
      document.getElementById('new-record').classList.toggle('hidden', !isNewRecord);
      gameOverEl.style.display = 'flex';
    }
    
    // Restart
    function restartGame() {
      gameOverEl.style.display = 'none';
      startGame();
    }
    
    // Button events
    document.getElementById('play-btn').onclick = startGame;
    document.getElementById('retry-btn').onclick = restartGame;
    
    // Input
    let keys = {};
    
    document.addEventListener('keydown', e => {
      if (gameState !== 'playing') return;
      keys[e.key] = true;
      
      if (e.key === 'ArrowLeft' || e.key === 'a') {
        player.lane = Math.max(-1, player.lane - 1);
      }
      if (e.key === 'ArrowRight' || e.key === 'd') {
        player.lane = Math.min(1, player.lane + 1);
      }
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && !player.isJumping) {
        player.vy = JUMP_FORCE;
        player.isJumping = true;
      }
      if ((e.key === 'ArrowDown' || e.key === 's') && !player.isSliding) {
        player.isSliding = true;
        player.slideTimer = 40;
        player.height = 30;
      }
    });
    
    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });
    
    // Touch controls
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => {
      if (gameState !== 'playing') return;
      touchStartX = e.touches[0].clientX;
    });
    
    canvas.addEventListener('touchmove', e => {
      if (gameState !== 'playing') return;
      const dx = e.touches[0].clientX - touchStartX;
      if (dx < -30) {
        player.lane = Math.max(-1, player.lane - 1);
        touchStartX = e.touches[0].clientX;
      }
      if (dx > 30) {
        player.lane = Math.min(1, player.lane + 1);
        touchStartX = e.touches[0].clientX;
      }
    });
    
    canvas.addEventListener('touchend', e => {
      if (gameState !== 'playing') return;
      // Swipe up for jump
      const touches = e.changedTouches;
      if (touches[0].clientY < touchStartX - 50 && !player.isJumping) {
        player.vy = JUMP_FORCE;
        player.isJumping = true;
      }
    });
    
    // Update HUD
    function updateHUD() {
      document.getElementById('header-dist').textContent = Math.floor(distance);
      document.getElementById('header-coins').textContent = coins;
      document.getElementById('hud-dist').textContent = Math.floor(distance);
      document.getElementById('hud-coins').textContent = coins;
    }
    
    // Spawn obstacles
    let lastObstacleDist = 0;
    
    function spawnObstacle() {
      if (distance - lastObstacleDist < 15 + Math.random() * 10) return;
      lastObstacleDist = distance;
      
      const numLanes = Math.random() > 0.7 ? 2 : 1;
      const usedLanes = [];
      
      for (let i = 0; i < numLanes; i++) {
        let lane;
        do {
          lane = LANES[Math.floor(Math.random() * LANES.length)];
        } while (usedLanes.includes(lane));
        usedLanes.push(lane);
        
        const type = Math.random() > 0.5 ? 'tall' : 'low';
        
        obstacles.push({
          lane: lane,
          x: W + 100,
          y: type === 'tall' ? H - 180 : H - 100,
          width: 50,
          height: type === 'tall' ? 80 : 40,
          type: type
        });
      }
    }
    
    // Spawn coins
    function spawnCoins() {
      if (Math.random() > 0.03) return;
      
      const lane = LANES[Math.floor(Math.random() * LANES.length)];
      const pattern = Math.floor(Math.random() * 3); // 0: line, 1: arc, 2: zigzag
      
      for (let i = 0; i < 5; i++) {
        let yOffset = 0;
        if (pattern === 1) yOffset = Math.sin(i * 0.5) * 30;
        if (pattern === 2 && i % 2 === 0) yOffset = -20;
        
        coinsArr.push({
          lane: lane,
          x: W + 100 + i * 40,
          y: H - 160 + yOffset,
          size: 15,
          collected: false,
          anim: Math.random() * Math.PI * 2
        });
      }
    }
    
    // Spawn pillars
    function spawnPillars() {
      pillars = pillars.filter(p => p.x > -100);
      
      if (pillars.length < 10 || pillars[pillars.length - 1].x < W) {
        pillars.push({
          x: W + 200 + Math.random() * 100,
          side: Math.random() > 0.5 ? -1 : 1
        });
      }
    }
    
    // Add particles
    function addParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6 - 2,
          size: Math.random() * 4 + 2,
          color: color,
          life: 1
        });
      }
    }
    
    // Update
    function update() {
      if (gameState !== 'playing') return;
      
      // Increase speed
      speed += speedIncrease;
      distance += speed * 0.05;
      
      // Player movement
      const targetX = W / 2 + player.lane * LANE_WIDTH;
      player.x += (targetX - player.x) * 0.15;
      
      // Jump physics
      if (player.isJumping) {
        player.vy += GRAVITY;
        player.y += player.vy;
        
        if (player.y >= H - 120) {
          player.y = H - 120;
          player.vy = 0;
          player.isJumping = false;
        }
      }
      
      // Slide
      if (player.isSliding) {
        player.slideTimer--;
        if (player.slideTimer <= 0) {
          player.isSliding = false;
          player.height = 60;
          player.y = H - 120;
        }
      }
      
      // Animation
      player.animFrame += speed * 0.03;
      
      // Update obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= speed;
        
        // Collision
        if (!player.isSliding) {
          const playerBox = {
            x: player.x - player.width / 2 + 10,
            y: player.y - player.height + 10,
            w: player.width - 20,
            h: player.height - 10
          };
          
          const obsBox = {
            x: obs.x,
            y: obs.y,
            w: obs.width,
            h: obs.height
          };
          
          if (rectIntersect(playerBox, obsBox)) {
            addParticles(player.x, player.y - player.height/2, '#c0392b', 20);
            gameOver();
            return;
          }
        }
        
        if (obs.x < -100) obstacles.splice(i, 1);
      }
      
      // Update coins
      for (let i = coinsArr.length - 1; i >= 0; i--) {
        const coin = coinsArr[i];
        coin.x -= speed;
        coin.anim += 0.1;
        
        // Collection
        if (!coin.collected) {
          const dx = player.x - coin.x;
          const dy = (player.y - player.height / 2) - coin.y;
          if (Math.sqrt(dx * dx + dy * dy) < 35) {
            coin.collected = true;
            coins++;
            score += 10;
            addParticles(coin.x, coin.y, COLORS.gold, 8);
            updateHUD();
          }
        }
        
        if (coin.x < -50 || coin.collected) {
          if (coin.collected) coinsArr.splice(i, 1);
          else if (coin.x < -50) coinsArr.splice(i, 1);
        }
      }
      
      // Update pillars
      for (let pillar of pillars) {
        pillar.x -= speed * 0.3;
      }
      spawnPillars();
      
      // Spawn
      spawnObstacle();
      spawnCoins();
      
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }
      
      updateHUD();
    }
    
    function rectIntersect(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }
    
    // Draw
    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // Background gradient
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#1a1714');
      bgGrad.addColorStop(1, '#2d2320');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);
      
      // Temple walls
      ctx.fillStyle = COLORS.wall;
      ctx.fillRect(0, 0, W * 0.15, H);
      ctx.fillRect(W * 0.85, 0, W * 0.15, H);
      
      // Wall details
      ctx.fillStyle = COLORS.wallLight;
      for (let i = 0; i < 8; i++) {
        const y = (i * 120 + distance * 0.2) % (H + 120) - 60;
        ctx.fillRect(W * 0.02, y, 20, 60);
        ctx.fillRect(W * 0.88, y, 20, 60);
      }
      
      // Floor/path
      ctx.fillStyle = COLORS.path;
      ctx.fillRect(W * 0.15, H - 80, W * 0.7, 80);
      
      // Path lines
      ctx.strokeStyle = COLORS.pathLight;
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const x = W * 0.15 + i * (W * 0.7 / 4);
        ctx.beginPath();
        ctx.moveTo(x, H - 80);
        ctx.lineTo(x + 30, H);
        ctx.stroke();
      }
      
      // Lane markers
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      ctx.setLineDash([20, 20]);
      ctx.beginPath();
      ctx.moveTo(W / 2 - LANE_WIDTH / 2, 0);
      ctx.lineTo(W / 2 - LANE_WIDTH / 2, H - 80);
      ctx.moveTo(W / 2 + LANE_WIDTH / 2, 0);
      ctx.lineTo(W / 2 + LANE_WIDTH / 2, H - 80);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Pillars
      for (let pillar of pillars) {
        const px = pillar.side === -1 ? W * 0.15 + 30 : W * 0.85 - 50;
        
        // Pillar shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(px + 5, H - 250, 20, 170);
        
        // Pillar
        ctx.fillStyle = COLORS.pillar;
        ctx.fillRect(px, H - 250, 20, 170);
        
        // Pillar top
        ctx.fillStyle = '#9b8365';
        ctx.fillRect(px - 5, H - 260, 30, 15);
        
        // Decorative lines
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(px + 5, H - 200, 10, 100);
      }
      
      // Obstacles
      for (let obs of obstacles) {
        const ox = W / 2 + obs.lane * LANE_WIDTH - obs.width / 2;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(ox + 5, H - 85, obs.width, 10);
        
        // Obstacle
        if (obs.type === 'tall') {
          // Tall obstacle (duck under)
          ctx.fillStyle = COLORS.obstacle;
          ctx.fillRect(ox, obs.y, obs.width, obs.height);
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.fillRect(ox, obs.y, obs.width, 8);
          
          // Warning stripes
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(ox, obs.y + 15 + i * 20, obs.width, 5);
          }
        } else {
          // Low obstacle (jump over)
          ctx.fillStyle = '#8b4513';
          ctx.fillRect(ox, obs.y, obs.width, obs.height);
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.fillRect(ox, obs.y, obs.width, 6);
          
          // Spikes
          ctx.fillStyle = COLORS.obstacle;
          ctx.beginPath();
          ctx.moveTo(ox, obs.y);
          ctx.lineTo(ox + obs.width / 2, obs.y - 15);
          ctx.lineTo(ox + obs.width, obs.y);
          ctx.fill();
        }
      }
      
      // Coins
      for (let coin of coinsArr) {
        if (coin.collected) continue;
        
        const cx = W / 2 + coin.lane * LANE_WIDTH;
        const bounce = Math.sin(coin.anim) * 5;
        
        ctx.save();
        ctx.translate(cx, coin.y + bounce);
        ctx.rotate(coin.anim * 0.5);
        
        // Coin shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(3, 10, coin.size * 0.8, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Coin
        const coinGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coin.size);
        coinGrad.addColorStop(0, COLORS.goldLight);
        coinGrad.addColorStop(1, COLORS.gold);
        ctx.fillStyle = coinGrad;
        ctx.beginPath();
        ctx.arc(0, 0, coin.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Coin shine
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(-3, -3, 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
      }
      
      // Player
      drawPlayer();
      
      // Particles
      for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // Distance markers on floor
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let i = 0; i < 10; i++) {
        const x = ((i * 100 - distance * 2) % (W + 200)) - 100;
        ctx.fillRect(x + W * 0.15, H - 75, 60, 3);
      }
    }
    
    function drawPlayer() {
      const px = player.x;
      const py = player.y;
      const bounce = Math.sin(player.animFrame) * 3;
      
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(px, H - 85, 20, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Running animation offset
      const runOffset = Math.sin(player.animFrame * 2) * 5;
      
      // Body
      ctx.fillStyle = '#e67e22';
      ctx.fillRect(px - 15, py - player.height + bounce, 30, player.height - bounce);
      
      // Shirt details
      ctx.fillStyle = '#d35400';
      ctx.fillRect(px - 15, py - player.height + bounce, 30, 8);
      
      // Head
      const headY = py - player.height - 10 + bounce;
      ctx.fillStyle = '#f5cba7';
      ctx.beginPath();
      ctx.arc(px, headY, 15, 0, Math.PI * 2);
      ctx.fill();
      
      // Hair
      ctx.fillStyle = '#5d4037';
      ctx.beginPath();
      ctx.arc(px, headY - 5, 12, Math.PI, Math.PI * 2);
      ctx.fill();
      
      // Face
      ctx.fillStyle = '#1a1714';
      // Eyes
      ctx.beginPath();
      ctx.arc(px - 4, headY - 2, 2, 0, Math.PI * 2);
      ctx.arc(px + 4, headY - 2, 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Running legs
      if (!player.isSliding && !player.isJumping) {
        ctx.fillStyle = '#2c3e50';
        const legOffset = Math.sin(player.animFrame * 2) * 10;
        ctx.fillRect(px - 10 + legOffset, py - 15, 8, 15);
        ctx.fillRect(px + 2 - legOffset, py - 15, 8, 15);
      }
      
      // Cape
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.moveTo(px - 15, py - player.height + 20 + bounce);
      ctx.lineTo(px - 25 - runOffset, py - 5);
      ctx.lineTo(px - 10, py - 10);
      ctx.fill();
    }
    
    // Game loop
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    
    // Init
    window.onresize = resize;
    resize();
    loop();
  </script>
</body>
</html>
