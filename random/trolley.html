<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absurd Trolley Problems</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .container {
    max-width: 800px;
    width: 100%;
  }
  
  h1 {
    font-size: 48px;
    text-align: center;
    margin-bottom: 50px;
  }
  
  .scenario {
    background: #2a2a2a;
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 30px;
  }
  
  .scenario-number {
    color: #888;
    margin-bottom: 20px;
  }
  
  .question {
    font-size: 24px;
    margin-bottom: 40px;
    line-height: 1.4;
  }
  
  .tracks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .track {
    background: #1a1a1a;
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s;
    border: 3px solid transparent;
    position: relative;
  }
  
  .track:hover {
    transform: translateY(-5px);
    border-color: #667eea;
  }
  
  .track.selected {
    border-color: #4caf50;
    background: #1a3a1a;
  }
  
  .track-label {
    font-size: 14px;
    color: #888;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .track-victims {
    font-size: 48px;
    margin-bottom: 15px;
  }
  
  .track-description {
    font-size: 18px;
    line-height: 1.4;
  }
  
  .stats {
    text-align: center;
    color: #888;
    font-size: 14px;
  }
  
  .next-btn {
    display: block;
    width: 100%;
    padding: 20px;
    font-size: 20px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 20px;
  }
  
  .next-btn:hover {
    background: #5568d3;
  }
  
  .next-btn:disabled {
    background: #444;
    cursor: not-allowed;
  }
  
  .moral-score {
    text-align: center;
    margin-top: 30px;
    padding: 20px;
    background: #2a2a2a;
    border-radius: 10px;
  }
  
  .moral-score-value {
    font-size: 48px;
    color: #667eea;
    margin: 10px 0;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>🚃 Absurd Trolley Problems</h1>
    
    <div class="scenario">
      <div class="scenario-number">Scenario <span id="scenarioNum">1</span>/10</div>
      <div class="question" id="question"></div>
      
      <div class="tracks">
        <div class="track" id="track1">
          <div class="track-label">Track 1</div>
          <div class="track-victims" id="victims1"></div>
          <div class="track-description" id="desc1"></div>
        </div>
        
        <div class="track" id="track2">
          <div class="track-label">Track 2</div>
          <div class="track-victims" id="victims2"></div>
          <div class="track-description" id="desc2"></div>
        </div>
      </div>
      
      <div class="stats" id="stats">Make your choice...</div>
    </div>
    
    <button class="next-btn" id="nextBtn" disabled>Next Scenario</button>
    
    <div class="moral-score">
      <div>Your Moral Ambiguity Score</div>
      <div class="moral-score-value" id="score">0</div>
      <div style="color: #888;">Higher is... more confusing?</div>
    </div>
  </div>
