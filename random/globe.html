<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globe Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-light: #f8f9fc;
            --bg-white: #ffffff;
            --bg-gray: #f1f3f8;
            --accent-blue: #2563eb;
            --accent-green: #059669;
            --accent-orange: #ea580c;
            --accent-purple: #7c3aed;
            --accent-cyan: #0891b2;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --text-light: #94a3b8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Three.js Container */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Header */
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: all;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-gray);
            padding: 6px;
            border-radius: 10px;
        }

        .mode-tab {
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-gray);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-tab:hover {
            color: var(--text-dark);
        }

        .mode-tab.active {
            background: var(--bg-white);
            color: var(--accent-blue);
            box-shadow: var(--shadow-sm);
        }

        /* Stats Panel */
        #stats-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: var(--bg-white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-md);
            pointer-events: all;
            min-width: 280px;
            display: none;
        }

        #stats-panel.show {
            display: block;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .panel-flag {
            font-size: 2.5rem;
        }

        .panel-title h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .panel-title p {
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: var(--bg-gray);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-box .value {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
        }

        .stat-box .label {
            font-size: 0.7rem;
            color: var(--text-gray);
            margin-top: 4px;
        }

        .stat-box.pop .value { color: var(--accent-blue); }
        .stat-box.area .value { color: var(--accent-green); }
        .stat-box.gdp .value { color: var(--accent-purple); }
        .stat-box.density .value { color: var(--accent-orange); }

        /* Controls */
        #controls-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: var(--bg-white);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-md);
            pointer-events: all;
        }

        .control-hint {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .control-hint:last-child {
            margin-bottom: 0;
        }

        .control-key {
            background: var(--bg-gray);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
        }

        /* Legend */
        #legend-panel {
            position: absolute;
            top: 90px;
            right: 24px;
            background: var(--bg-white);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-md);
            pointer-events: all;
            max-width: 220px;
        }

        #legend-panel h3 {
            font-size: 0.8rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        /* Search */
        #search-panel {
            position: absolute;
            top: 90px;
            left: 24px;
            background: var(--bg-white);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-md);
            pointer-events: all;
            width: 280px;
        }

        #search-panel h3 {
            font-size: 0.8rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            background: var(--bg-gray);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-white);
        }

        #search-results {
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-result:hover {
            background: var(--bg-gray);
        }

        .search-result .flag {
            font-size: 1.2rem;
        }

        .search-result .name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading p {
            margin-top: 20px;
            color: var(--text-gray);
        }

        /* Tooltip */
        #globe-tooltip {
            position: fixed;
            background: var(--bg-white);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: var(--shadow-md);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            text-align: center;
        }

        #globe-tooltip.show {
            opacity: 1;
        }

        #globe-tooltip .flag {
            font-size: 2rem;
            display: block;
            margin-bottom: 4px;
        }

        #globe-tooltip .name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        #globe-tooltip .value {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-gray);
        }
    </style>
</head>

        function createGlobe() {
            // Globe geometry
            const geometry = new THREE.SphereGeometry(100, 64, 64);

            // Create continents (simplified - using noise pattern)
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Create a simple continent-like pattern
            ctx.fillStyle = '#e8f0f8';
            ctx.fillRect(0, 0, 512, 256);

            // Add some "continents" using circles and paths
            ctx.fillStyle = '#c8daf0';
            
            // North America
            ctx.beginPath();
            ctx.ellipse(100, 70, 60, 50, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // South America
            ctx.beginPath();
            ctx.ellipse(150, 170, 30, 60, 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Europe/Africa
            ctx.beginPath();
            ctx.ellipse(300, 100, 40, 40, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(310, 160, 35, 50, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Asia
            ctx.beginPath();
            ctx.ellipse(420, 80, 70, 50, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Australia
            ctx.beginPath();
            ctx.ellipse(450, 190, 30, 25, 0, 0, Math.PI * 2);
            ctx.fill();

            const texture = new THREE.CanvasTexture(canvas);
            
            const material = new THREE.MeshPhongMaterial({
                map: texture,
                shininess: 10,
                specular: 0x333333
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Atmosphere glow
            const atmosphereGeometry = new THREE.SphereGeometry(105, 64, 64);
            const atmosphereMaterial = new THREE.MeshPhongMaterial({
                color: 0x2563eb,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphere);

            // Simple rotation controls (mouse drag)
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.clientX - previousMousePosition.x,
                        y: e.clientY - previousMousePosition.y
                    };

                    globe.rotation.y += deltaMove.x * 0.005;
                    globe.rotation.x += deltaMove.y * 0.005;

                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mouseleave', () => {
                isDragging = false;
            });

            // Zoom
            renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.position.z += e.deltaY * 0.2;
                camera.position.z = Math.max(150, Math.min(500, camera.position.z));
            });
        }

        function updateMarkers() {
            // Clear existing markers
            game.markerGroup.clear();

            // Get max value for scaling
            const maxVal = Math.max(...COUNTRIES.map(c => getValue(c)));
            const minVal = Math.min(...COUNTRIES.map(c => getValue(c)));

            // Update legend
            document.getElementById('legend-min').textContent = formatNumber(minVal);
            document.getElementById('legend-max').textContent = formatNumber(maxVal);

            // Create markers
            COUNTRIES.forEach(country => {
                const value = getValue(country);
                const normalized = (value - minVal) / (maxVal - minVal);
                const size = 3 + normalized * 15;

                // Convert lat/lng to 3D position
                const phi = (90 - country.lat) * Math.PI / 180;
                const theta = (country.lng + 180) * Math.PI / 180;
                
                const x = -Math.sin(phi) * Math.cos(theta) * 102;
                const y = Math.cos(phi) * 102;
                const z = Math.sin(phi) * Math.sin(theta) * 102;

                // Marker
                const geometry = new THREE.SphereGeometry(size, 16, 16);
                const material = new THREE.MeshPhongMaterial({
                    color: getColor(normalized),
                    emissive: getColor(normalized),
                    emissiveIntensity: 0.3
                });
                const marker = new THREE.Mesh(geometry, material);
                marker.position.set(x, y, z);
                marker.userData = country;
                
                game.markerGroup.add(marker);
                game.markers.push(marker);
            });
        }

        function getValue(country) {
            switch(game.mode) {
                case 'population': return country.population;
                case 'area': return country.area;
                case 'gdp': return country.gdp;
                case 'density': return country.density;
                default: return country.population;
            }
        }

        function getColor(normalized) {
            const colors = [
                new THREE.Color(0x2563eb),
                new THREE.Color(0x0891b2)
            ];
            return colors[0].lerp(colors[1], normalized);
        }

        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        function formatArea(num) {
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M km²';
            return (num / 1e3).toFixed(0) + 'K km²';
        }

        function formatGDP(num) {
            if (num >= 1e12) return '$' + (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return '$' + (num / 1e9).toFixed(1) + 'B';
            return '$' + formatNumber(num);
        }

        function selectCountry(country) {
            game.selected = country.name;
            
            document.getElementById('panel-flag').textContent = country.flag;
            document.getElementById('panel-name').textContent = country.name;
            
            const sorted = [...COUNTRIES].sort((a, b) => getValue(b) - getValue(a));
            const rank = sorted.findIndex(c => c.name === country.name) + 1;
            const modeLabel = { population: 'Population', area: 'Area', gdp: 'GDP', density: 'Density' };
            document.getElementById('panel-rank').textContent = `#${rank} in ${modeLabel[game.mode]}`;
            
            document.getElementById('stat-pop').textContent = formatNumber(country.population);
            document.getElementById('stat-area').textContent = formatArea(country.area);
            document.getElementById('stat-density').textContent = country.density + '/km²';
            document.getElementById('stat-gdp').textContent = formatGDP(country.gdp);
            
            document.getElementById('stats-panel').classList.add('show');

            // Rotate globe to country
            const phi = (90 - country.lat) * Math.PI / 180;
            const theta = (country.lng + 180) * Math.PI / 180;
            
            const targetRotationX = Math.PI / 2 - phi;
            const targetRotationY = -theta;
            
            // Animate rotation
            const startRotX = globe.rotation.x;
            const startRotY = globe.rotation.y;
            const duration = 1000;
            const startTime = Date.now();
            
            function animateRotation() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                
                globe.rotation.x = startRotX + (targetRotationX - startRotX) * eased;
                globe.rotation.y = startRotY + (targetRotationY - startRotY) * eased;
                
                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                }
            }
            animateRotation();
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(game.markerGroup.children);

            if (intersects.length > 0) {
                const country = intersects[0].object.userData;
                selectCountry(country);
            }
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(game.markerGroup.children);

            const tooltip = document.getElementById('globe-tooltip');
            
            if (intersects.length > 0) {
                const country = intersects[0].object.userData;
                tooltip.querySelector('.flag').textContent = country.flag;
                tooltip.querySelector('.name').textContent = country.name;
                tooltip.querySelector('.value').textContent = formatNumber(getValue(country));
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                tooltip.classList.add('show');
                renderer.domElement.style.cursor = 'pointer';
            } else {
                tooltip.classList.remove('show');
                renderer.domElement.style.cursor = 'grab';
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Mode switching
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                game.mode = tab.dataset.mode;
                updateMarkers();
            });
        });

        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const results = document.getElementById('search-results');
            
            if (query.length < 2) {
                results.innerHTML = '';
                return;
            }
            
            const matches = COUNTRIES.filter(c => c.name.toLowerCase().includes(query));
            results.innerHTML = matches.slice(0, 8).map(country => `
                <div class="search-result" data-name="${country.name}">
                    <span class="flag">${country.flag}</span>
                    <span class="name">${country.name}</span>
                </div>
            `).join('');
            
            results.querySelectorAll('.search-result').forEach(item => {
                item.addEventListener('click', () => {
                    const country = COUNTRIES.find(c => c.name === item.dataset.name);
                    selectCountry(country);
                    document.getElementById('search-input').value = '';
                    results.innerHTML = '';
                });
            });
        });

        // Initialize
        init();
    </script>
</body>
</html>
