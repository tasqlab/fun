<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stress Relief Button (localStorage)</title>
<style>
  /* ---- Page layout ---- */
  body,html{
    height:100%; margin:0; font-family:system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center;
    background:#111; color:#eee;
  }
  #app{ text-align:center; }

  /* ---- Button ---- */
  #reliefBtn{
    padding:1.5rem 3rem;
    font-size:2rem;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:background .2s ease, transform .1s ease;
    box-shadow:0 0 20px rgba(0,0,0,.5);
  }
  #reliefBtn:active{ transform:scale(.97); }

  /* ---- Counter & notice ---- */
  #counter{ margin-top:2rem; font-size:1.2rem; letter-spacing:.5px; }
  #notice{ margin-top:1rem; font-size:.9rem; color:#aaa; }
</style>
</head>
<body>
<div id="app">
  <h1>Stress Relief Button</h1>
  <button id="reliefBtn">Click me!</button>
  <div id="counter">Clicks: <span id="count">0</span></div>
  <div idNotice>✓ Counter saved in your browser’s <code>localStorage</code></div>
</div>

<script>
/* ---------- Sound library (pop sounds) ---------- */
const popSounds = [
  "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/pop1.wav",
  "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/pop2.wav",
  "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/pop3.wav",
  "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/pop4.wav",
  "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/pop5.wav"
];
const audioPool = popSounds.map(url => {
  const a = new Audio(url);
  a.preload = "auto";
  return a;
});

/* ---------- Neon colour helper (HSV → RGB) ---------- */
function randomNeonColor() {
  const h = Math.random();
  const s = 0.8 + Math.random()*0.2;   // 0.8‑1.0
  const v = 0.9 + Math.random()*0.1;   // 0.9‑1.0  let r,g,b,i,f,p,q,t;
  i = Math.floor(h*6);
  f = h*6 - i;
  p = v*(1-s);
  q = v*(1-f*s);
  t = v*(1-(1-f)*s);
  switch(i%6){
    case 0: r=v; g=t; b=p; break;
    case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break;
    case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break;
    case 5: r=v; g=p; b=q; break;
  }
  return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

/* ---------- UI references ---------- */
const btn   = document.getElementById("reliefBtn");
const countSpan = document.getElementById("count");

/* ---------- Load or init counter from localStorage ---------- */
let count = parseInt(localStorage.getItem("stressClickCount"),10) || 0;
countSpan.textContent = count;

/* ---------- Click handler ---------- */
btn.addEventListener("click", () => {
  // Play a random pop sound
  const snd = audioPool[Math.floor(Math.random()*audioPool.length)];
  snd.currentTime = 0;
  snd.play().catch(e=>console.warn("Audio play failed",e));

  // Change button colour to a random neon hue
  btn.style.background = randomNeonColor();

  // Increment and store counter  count++;
  localStorage.setItem("stressClickCount", count);
  countSpan.textContent = count;
});
</script>
</body>
</html>
